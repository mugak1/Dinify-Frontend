name: Deploy to Firebase Hosting (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # Intentionally builds with --configuration=uat for now: the prod backend
      # API doesn't exist yet, so a --configuration=production build would point
      # the live site at a non-existent API. Switch to production config in a
      # later PR once the prod backend is available.
      - name: Build for Production
        run: npx ng build --configuration=uat

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: dinify-dev
          target: dinify-prod
