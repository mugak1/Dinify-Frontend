name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Tenant-isolation closure gate
        # Fail-fast tenant-boundary regression gate (TENANT-ISO-PR6B): the focused
        # _security closure spec + the diner-capability, QR-lifecycle and
        # selected-restaurant specs it builds on. Runs BEFORE the full suite so a
        # broken restaurant/diner boundary fails early. Mirrors scripts/verify.sh;
        # does NOT replace the full "Test" step below.
        run: npm run test:tenant-boundary

      - name: Test
        run: npm run test:ci

      - name: Build (production)
        run: npm run build:prod
