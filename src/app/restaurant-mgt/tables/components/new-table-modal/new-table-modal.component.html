<app-dn-dialog [open]="open" (closed)="onClose()" maxWidth="md">
  <h2 class="text-lg font-semibold mb-4">{{ table ? 'Edit Table' : 'New Table' }}</h2>

  <form (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Number + Display Name -->
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label for="table-number" class="text-sm font-medium">Table Number *</label>
        <input
          id="table-number"
          type="number"
          [(ngModel)]="number"
          name="number"
          [min]="1"
          required
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring"
        />
      </div>
      <div class="space-y-1.5">
        <label for="display-name" class="text-sm font-medium">Display Name</label>
        <input
          id="display-name"
          type="text"
          [(ngModel)]="displayName"
          name="displayName"
          placeholder="Optional"
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring"
        />
      </div>
    </div>

    <!-- Capacity -->
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label for="min-capacity" class="text-sm font-medium">Min Seats</label>
        <input
          id="min-capacity"
          type="number"
          [(ngModel)]="minCapacity"
          name="minCapacity"
          [min]="1"
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring"
        />
      </div>
      <div class="space-y-1.5">
        <label for="max-capacity" class="text-sm font-medium">Max Seats *</label>
        <input
          id="max-capacity"
          type="number"
          [(ngModel)]="maxCapacity"
          name="maxCapacity"
          [min]="1"
          required
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring"
        />
      </div>
    </div>

    <!-- Shape + Area -->
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label for="shape" class="text-sm font-medium">Shape</label>
        <select
          id="shape"
          [(ngModel)]="shape"
          name="shape"
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring"
        >
          @for (opt of shapeOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
      <div class="space-y-1.5">
        <label for="area" class="text-sm font-medium">Default Area</label>
        <select
          id="area"
          [(ngModel)]="areaId"
          name="areaId"
          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring"
        >
          <option value="">No area</option>
          @for (a of areas; track a.id) {
            <option [value]="a.id">{{ a.name }}</option>
          }
        </select>
      </div>
    </div>

    <!-- Tags -->
    <div class="space-y-1.5">
      <label class="text-sm font-medium">Tags</label>
      <div class="flex flex-wrap gap-2">
        @for (tag of tagOptions; track tag) {
          <button
            type="button"
            (click)="toggleTag(tag)"
            class="cursor-pointer"
          >
            <app-dn-badge [variant]="tags.includes(tag) ? 'default' : 'outline'">
              {{ tag }}
            </app-dn-badge>
          </button>
        }
      </div>
    </div>

    <!-- Active Toggle -->
    <div class="flex items-center justify-between">
      <span class="text-sm">Active</span>
      <app-dn-switch
        [checked]="isActive"
        (checkedChange)="isActive = $event"
        size="sm"
      ></app-dn-switch>
    </div>

    <!-- QR Code Section -->
    <div class="space-y-3 pt-2 border-t">
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          [(ngModel)]="generateQR"
          name="generateQR"
          class="h-4 w-4 rounded border-input"
        />
        <span class="text-sm">Generate QR code on save</span>
      </label>

      @if (generateQR) {
        <div class="space-y-2 ml-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="radio"
              [(ngModel)]="qrMode"
              name="qrMode"
              value="menu_only"
              class="h-4 w-4"
            />
            <span class="text-sm">View menu only</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="radio"
              [(ngModel)]="qrMode"
              name="qrMode"
              value="order_pay"
              class="h-4 w-4"
            />
            <span class="text-sm">Order &amp; pay</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="radio"
              [(ngModel)]="qrMode"
              name="qrMode"
              value="order_only"
              class="h-4 w-4"
            />
            <span class="text-sm">Order only</span>
          </label>
        </div>
      }
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-2 pt-4">
      <button app-dn-button type="button" variant="outline" (click)="onClose()">Cancel</button>
      <button app-dn-button type="submit" [disabled]="!number || !maxCapacity">
        {{ table ? 'Save Changes' : 'Save Table' }}
      </button>
    </div>
  </form>
</app-dn-dialog>
