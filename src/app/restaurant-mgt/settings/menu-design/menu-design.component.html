<div class="w-full bg-white rounded shadow">
    <form *ngIf="ConfigForm" [formGroup]="ConfigForm" (ngSubmit)="ConfigForm.valid?Save():false" class="border-t border-gray-200">
        <div class="px-4 pt-4 bg-white rounded-lg">
            <div id="accordion-flush" data-accordion="collapse">
                <h2 id="accordion-flush-heading-1">
                    <div class="flex items-center justify-between w-full py-5 font-medium text-left rtl:text-right text-gray-500 border-b border-gray-200">
                        <span>Diner's Portal</span>
                    </div>
                </h2>
                <div *ngIf="HomeForm" [formGroup]="HomeForm">
                    <div class="pb-5">
                        <div class="flex items-center justify-between w-full py-3 font-medium text-left rtl:text-right text-gray-500 border-b border-gray-200">
                            <p class="text-gray-500">Header style</p>
                            <div class="flex items-center gap-4 ml-auto">
                                <label class="flex items-center gap-2 text-sm text-gray-700">
                                    <input type="radio" formControlName="header_style" value="cover" class="text-d-red focus:ring-d-red"/>
                                    <span>Cover image</span>
                                </label>
                                <label class="flex items-center gap-2 text-sm text-gray-700">
                                    <input type="radio" formControlName="header_style" value="solid" class="text-d-red focus:ring-d-red"/>
                                    <span>Solid colour</span>
                                </label>
                                <label class="flex items-center gap-2 text-sm text-gray-700">
                                    <input type="radio" formControlName="header_style" value="minimal" class="text-d-red focus:ring-d-red"/>
                                    <span>Minimal</span>
                                </label>
                            </div>
                        </div>

                        <ng-container *ngIf="HomeForm.get('header_style')?.value === 'cover'">
                            <div class="flex items-center justify-between w-full py-3 font-medium text-left rtl:text-right text-gray-500 border-b border-gray-200">
                                <p class="text-gray-500">Upload cover photo</p>
                                <div class="ml-auto">
                                    <div (click)="photoUpload.click()" class="flex file-upload text-sm text-gray-300">
                                        <button type="button" class="bg-d-red rounded-full p-2">
                                            <svg width="20px" height="20px" viewBox="-8 0 32 32" fill="#ffffff" stroke="#ffffff">
                                                <g>
                                                    <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd" sketch:type="MSPage">
                                                        <g id="Icon-Set" sketch:type="MSLayerGroup" transform="translate(-212.000000, -151.000000)" fill="#ffffff">
                                                            <path
                                                                d="M226,155 L226,175 C226,178.313 223.313,181 220,181 C216.687,181 214,178.313 214,175 L214,157 C214,154.791 215.791,153 218,153 C220.209,153 222,154.791 222,157 L222,175 C222,176.104 221.104,177 220,177 C218.896,177 218,176.104 218,175 L218,159 L216,159 L216,175 C216,177.209 217.791,179 220,179 C222.209,179 224,177.209 224,175 L224,157 C224,153.687 221.313,151 218,151 C214.687,151 212,153.687 212,157 L212,176 C212.493,179.945 215.921,183 220,183 C224.079,183 227.507,179.945 228,176 L228,155 L226,155"
                                                                id="attachment" sketch:type="MSShapeGroup"></path>
                                                        </g>
                                                    </g>
                                                </g>
                                            </svg>
                                        </button>
                                        <span class="my-auto ml-3">{{this.rest.cover_photo?'Change Photo':(coverfileName || "No file uploaded yet.")}}</span>
                                    </div>
                                    <input type="file" #photoUpload (change)="InputCover($event)" class="bg-gray-50 border hidden border-gray-300 placeholder:text-xs text-gray-900 sm:text-sm rounded focus:ring-primary-600 focus:border-primary-600 w-full p-2.5" placeholder="Enter the restaurant logo">
                                </div>
                            </div>
                            <div *ngIf="this.rest.cover_photo" class="flex flex-col w-full">
                                <app-common-image class="mx-auto" [src]="this.rest.cover_photo" [width]="'300'" [alt]="this.rest.name"></app-common-image>
                                <button (click)="DeleteCoverPhoto()" type="button" class="text-black bg-white border border-d-red hover:bg-gray-800 focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded text-sm px-5 py-2.5 my-4 text-center ml-auto">Delete Cover Photo</button>
                            </div>
                        </ng-container>

                        <div class="flex items-center justify-between w-full py-3 font-medium text-left rtl:text-right text-gray-500 border-b border-gray-200">
                            <p class="text-gray-500">Brand colour</p>
                            <span class="w-6 h-6 ring ring-black outline-none ml-auto"
                                [style.background]="HomeForm.get('brand_color')?.value"
                                [colorPicker]="HomeForm.get('brand_color')?.value"
                                (colorPickerChange)="HomeForm.get('brand_color')?.setValue($event)"></span>
                        </div>

                        <div class="flex items-center justify-between w-full py-3 font-medium text-left rtl:text-right text-gray-500 border-b border-gray-200">
                            <p class="text-gray-500">Logo display</p>
                            <div class="flex items-center gap-4 ml-auto">
                                <label class="flex items-center gap-2 text-sm text-gray-700">
                                    <input type="radio" formControlName="logo_display" value="logo_only" class="text-d-red focus:ring-d-red"/>
                                    <span>Logo only</span>
                                </label>
                                <label class="flex items-center gap-2 text-sm text-gray-700">
                                    <input type="radio" formControlName="logo_display" value="name_only" class="text-d-red focus:ring-d-red"/>
                                    <span>Name only</span>
                                </label>
                                <label class="flex items-center gap-2 text-sm text-gray-700">
                                    <input type="radio" formControlName="logo_display" value="logo_and_name" class="text-d-red focus:ring-d-red"/>
                                    <span>Logo and name</span>
                                </label>
                            </div>
                        </div>

                        <div class="flex items-center justify-between w-full py-3 font-medium text-left rtl:text-right text-gray-500 border-b border-gray-200">
                            <p class="text-gray-500">Tagline</p>
                            <input type="text" formControlName="tagline" maxlength="40" placeholder="Authentic Italian since 2019"
                                class="ml-auto bg-gray-50 border border-gray-300 placeholder:text-xs text-gray-900 sm:text-sm rounded focus:ring-primary-600 focus:border-primary-600 p-2.5"/>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex items-center px-4 pb-4 space-x-3 rtl:space-x-reverse rounded-b">
            <button type="submit" class="text-white bg-d-red hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded text-sm w-40 px-5 py-2.5 text-center ml-auto">Save</button>
        </div>
    </form>
</div>
