<form *ngIf="RestaurantForm" [formGroup]="RestaurantForm" (ngSubmit)="RestaurantForm.valid?Save():is_submitted=true" class="relative bg-card text-card-foreground rounded-lg border shadow-[var(--shadow-md)]">

    <!-- Modal body -->
    <div class="p-6 space-y-6">
        <div class="space-y-2 md:space-y-4">
            <div>
                <label for="name" class="block mb-1 text-sm font-medium text-foreground">Restaurant Name <span class="text-primary">*</span></label>
                <input type="text" formControlName="name" id="name" class="bg-muted border border-border placeholder:text-xs text-foreground sm:text-sm rounded focus:ring-ring focus:border-ring block w-full p-2.5" placeholder="Enter the restaurant name">
                <div *ngIf="is_submitted && RestaurantForm.get('name')?.errors" class="text-primary text-xs">
                    <div *ngIf="RestaurantForm.get('name')?.errors?.['required']">Name is required</div>
                </div>
            </div>
            <div>
                <label for="location" class="block mb-1 text-sm font-medium text-foreground">Address <span class="text-primary">*</span></label>
                <textarea type="text" formControlName="location" id="location" class="bg-muted border border-border placeholder:text-xs text-foreground sm:text-sm rounded focus:ring-ring focus:border-ring block w-full p-2.5 " placeholder="Enter the location of the restaurant"></textarea>
                <div *ngIf="is_submitted && RestaurantForm.get('location')?.errors" class="text-primary text-xs">
                    <div *ngIf="RestaurantForm.get('location')?.errors?.['required']">Address is required</div>
                </div>
            </div>
            <div>
                <label for="photo" class="block mb-1 text-sm font-medium text-foreground">Logo <span class="text-primary">*</span></label>
                <div  (click)="photoUpload.click()" class="flex file-upload text-sm text-muted-foreground">

                    
                 
                     <button app-dn-button type="button" size="icon" class="rounded-full"
                      >
                    <svg width="20px" height="20px" viewBox="-8 0 32 32" fill="#ffffff" stroke="#ffffff">                                 
                        <g>
                            <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd" sketch:type="MSPage">
                                <g id="Icon-Set" sketch:type="MSLayerGroup" transform="translate(-212.000000, -151.000000)" fill="#ffffff">
                                    <path
                                        d="M226,155 L226,175 C226,178.313 223.313,181 220,181 C216.687,181 214,178.313 214,175 L214,157 C214,154.791 215.791,153 218,153 C220.209,153 222,154.791 222,157 L222,175 C222,176.104 221.104,177 220,177 C218.896,177 218,176.104 218,175 L218,159 L216,159 L216,175 C216,177.209 217.791,179 220,179 C222.209,179 224,177.209 224,175 L224,157 C224,153.687 221.313,151 218,151 C214.687,151 212,153.687 212,157 L212,176 C212.493,179.945 215.921,183 220,183 C224.079,183 227.507,179.945 228,176 L228,155 L226,155"
                                        id="attachment" sketch:type="MSShapeGroup"> </path>
                                </g>
                            </g>
                        </g>
                    </svg>
                     </button>
                     <span class="my-auto ml-3">{{(RestaurantForm.get('id')?.value&&(typOf(RestaurantForm.get('logo')?.value)==='string'))?'Change Image':(fileName || "No file uploaded yet.")}}   </span>
                  
                 </div>
                 <app-common-image [imgclass]="'mx-auto my-1'" *ngIf="RestaurantForm.get('id')?.value&&(typOf(RestaurantForm.get('logo')?.value)==='string')" [src]="RestaurantForm.get('logo')?.value" [width]="'300'" [alt]="RestaurantForm.get('name')?.value"></app-common-image>
                <input type="file" #photoUpload (change)="InputLogo($event)" class="bg-muted border hidden border-border placeholder:text-xs text-foreground sm:text-sm rounded focus:ring-ring focus:border-ring w-full p-2.5 " placeholder="Enter the restaurant logo">
                <div *ngIf="is_submitted && RestaurantForm.get('logo')?.errors" class="text-primary text-xs">
                    <div *ngIf="RestaurantForm.get('logo')?.errors?.['required']">The Logo is required</div>
                </div>
            </div>

<div *ngIf="(auth.userValue?.profile?.roles?.includes('dinify_admin'))" class="flex items-center p-6 space-x-3 rtl:space-x-reverse border-t border-border rounded-b mb-6">
    <button app-dn-button variant="destructive" (click)="Block()" type="button" class="w-full ml-auto">Block Account</button>
