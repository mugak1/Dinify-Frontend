<div class="mx-auto w-full max-w-5xl">
  <!-- Page header -->
  <header class="mb-6">
    <h1 class="text-2xl font-semibold text-gray-900">Settings</h1>
    <p class="text-sm text-gray-500 mt-1">
      Manage your restaurant, your team, and your account.
    </p>
  </header>

  @for (group of groups; track group.title) {
    <section class="mb-8 last:mb-0">
      <h2 class="text-xs font-semibold uppercase tracking-wide text-gray-400 mb-3">
        {{ group.title }}
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
        @for (item of group.items; track item.route) {
          <a
            [routerLink]="item.route"
            class="group flex items-start gap-4 p-6 rounded-lg border border-gray-200 bg-card transition-all duration-200 desktop-hover:-translate-y-0.5 desktop-hover:border-gray-300 desktop-hover:shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary"
          >
            <span class="shrink-0 inline-flex items-center justify-center w-14 h-14 rounded-lg bg-primary/10 text-primary">
              <app-settings-icon [name]="item.icon" class="w-7 h-7"></app-settings-icon>
            </span>
            <span class="min-w-0">
              <h3 class="text-xl font-semibold text-gray-900">{{ item.label }}</h3>
              <span class="block text-base text-gray-500 mt-1">{{ item.description }}</span>
            </span>
          </a>
        }
      </div>
    </section>
  }
</div>
