<app-dn-dialog [open]="open" maxWidth="lg" (closed)="onCancel()">
  <div class="space-y-4 overflow-hidden">
    <!-- Header -->
    <div>
      <h3 class="text-section-title text-foreground">{{ title }}</h3>
      <p class="text-xs text-gray-500 mt-0.5">
        These tags appear on the menu items diners browse.
      </p>
    </div>

    <!-- Live preview -->
    <div class="flex items-center gap-3 bg-gray-50 border border-gray-100 rounded-md px-3 py-2">
      <span class="text-xs text-gray-500">Preview:</span>
      <app-tag-pill
        [name]="name.trim() || 'Tag name'"
        [icon]="icon"
        [colour]="colour"
        size="md"
      ></app-tag-pill>
    </div>

    <!-- Name -->
    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Name</label>
      <input
        type="text"
        [(ngModel)]="name"
        (ngModelChange)="onNameChange()"
        [maxlength]="maxName"
        class="w-full text-sm rounded border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-d-red focus:border-transparent"
        placeholder="e.g. Spicy"
      />
      <div class="flex items-center justify-between mt-1">
        <p class="text-xs text-red-600 min-h-[1rem]">{{ nameError }}</p>
        <p class="text-[11px] text-gray-400">{{ name.length }}/{{ maxName }}</p>
      </div>
    </div>

    <!-- Category -->
    <div>
      <span class="block text-xs font-medium text-gray-700 mb-1">Category</span>
      <div class="space-y-1.5">
        @for (cat of categories; track cat.value) {
          <label class="flex items-start gap-2 cursor-pointer">
            <input
              type="radio"
              name="category"
              class="mt-0.5 h-4 w-4 accent-d-red"
              [value]="cat.value"
              [checked]="category === cat.value"
              (change)="selectCategory(cat.value)"
            />
            <span class="flex-1">
              <span class="block text-sm text-gray-900">{{ cat.label }}</span>
              <span class="block text-[11px] text-gray-500">{{ cat.helpText }}</span>
            </span>
          </label>
        }
      </div>
    </div>

    <!-- Colour -->
    <div>
      <span class="block text-xs font-medium text-gray-700 mb-1">Colour</span>
      <div class="flex flex-wrap gap-2">
        @for (sw of palette; track sw.name) {
          <button
            type="button"
            (click)="selectColour(sw.name)"
            [class]="'h-7 w-7 rounded-full border-2 transition ' + sw.swatchClass + (colour === sw.name ? ' border-gray-900 ring-2 ring-offset-1 ring-gray-300' : ' border-white shadow')"
            [attr.aria-label]="sw.label"
            [attr.aria-pressed]="colour === sw.name"
            [title]="sw.label"
          ></button>
        }
      </div>
    </div>

    <!-- Icon -->
    <div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-medium text-gray-700">Icon</span>
        <input
          type="text"
          [(ngModel)]="iconSearch"
          placeholder="Search icons"
          class="text-xs rounded border border-gray-300 px-2 py-1 w-40 focus:outline-none focus:ring-1 focus:ring-d-red"
        />
      </div>
      <div class="grid grid-cols-6 sm:grid-cols-8 gap-1.5 max-h-44 overflow-y-auto p-1 border border-gray-100 rounded">
        <button
          type="button"
          (click)="selectIcon(null)"
          [class]="'flex items-center justify-center h-8 w-8 rounded border text-[10px] ' + (icon === null ? 'border-d-red bg-red-50 text-d-red' : 'border-gray-200 text-gray-500 hover:bg-gray-50')"
          title="No icon"
        >None</button>
        @for (ic of filteredIcons; track ic.name) {
          <button
            type="button"
            (click)="selectIcon(ic.name)"
            [class]="'flex items-center justify-center h-8 w-8 rounded border ' + (icon === ic.name ? 'border-d-red bg-red-50 text-d-red' : 'border-gray-200 text-gray-600 hover:bg-gray-50')"
            [title]="ic.label"
            [attr.aria-label]="ic.label"
            [innerHTML]="ic.svg"
          ></button>
        }
      </div>
    </div>

    <!-- Filterable toggle -->
    <div class="flex items-start gap-2">
      <input
        id="preset-tag-filterable"
        type="checkbox"
        class="mt-0.5 h-4 w-4 accent-d-red"
        [(ngModel)]="filterable"
      />
      <label for="preset-tag-filterable" class="flex-1 cursor-pointer">
        <span class="block text-sm text-gray-900">Filterable</span>
        <span class="block text-[11px] text-gray-500">When on, diners can filter the menu by this tag.</span>
      </label>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-2 pt-2 border-t border-gray-100">
      <button app-dn-button variant="outline" type="button" (click)="onCancel()" [disabled]="saving">Cancel</button>
      <button app-dn-button type="button" (click)="onSubmit()" [loading]="saving" [disabled]="saving || !!nameError"
      >{{ saving ? 'Saving…' : (isEditing ? 'Save changes' : 'Add tag') }}</button>
    </div>
  </div>
</app-dn-dialog>
