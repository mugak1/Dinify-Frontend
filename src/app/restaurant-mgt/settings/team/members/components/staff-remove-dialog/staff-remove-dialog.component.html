<app-dn-dialog [open]="open" maxWidth="sm" (closed)="onCancel()">
  @if (staff) {
    <div class="space-y-3">
      <div class="flex items-start gap-2">
        <span class="text-amber-500 mt-0.5" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        </span>
        <h3 class="text-base font-semibold text-gray-900">Remove {{ staff.name }}?</h3>
      </div>

      <p class="text-sm text-gray-700">
        This person will no longer have access to this restaurant. Please give a
        reason for removing them.
      </p>

      <div>
        <label for="staff-remove-reason" class="block text-xs font-medium text-gray-700 mb-1">Reason <span class="text-d-red">*</span></label>
        <textarea
          id="staff-remove-reason"
          rows="3"
          [(ngModel)]="reason"
          placeholder="e.g. No longer with the team"
          class="w-full text-sm rounded border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-d-red focus:border-transparent"
        ></textarea>
        @if (submitted && !reason.trim()) {
          <p class="text-xs text-red-600 mt-1">A reason is required.</p>
        }
      </div>

      <div class="flex items-center justify-end gap-2 pt-2 border-t border-gray-100">
        <button
          type="button"
          class="px-3 py-2 text-sm rounded border border-gray-300 text-gray-700 hover:bg-gray-50"
          (click)="onCancel()"
          [disabled]="removing"
        >Cancel</button>
        <button
          type="button"
          class="px-3 py-2 text-sm rounded bg-d-red text-white hover:bg-red-800 disabled:opacity-50"
          (click)="onConfirm()"
          [disabled]="removing"
        >{{ removing ? 'Removing…' : 'Remove' }}</button>
      </div>
    </div>
  }
</app-dn-dialog>
