<app-settings-section-page
  title="Staff & roles"
  icon="staff"
  description="Invite team members and manage their access."
  [state]="sectionState"
  errorMessage="Couldn't load your staff."
  emptyTitle="No staff yet"
  emptyMessage="Invite your first team member to give them access to this restaurant."
  (retry)="retry()"
>
  <button section-actions app-dn-button (click)="openAdd()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    Add staff
  </button>

  <button empty-action app-dn-button (click)="openAdd()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    Add your first staff member
  </button>

  <!-- Ready: search + list -->
  <div class="px-4 sm:px-6 py-3 border-b border-gray-100">
    <label for="staff-search" class="sr-only">Search staff</label>
    <div class="relative">
      <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input
        id="staff-search"
        type="text"
        [value]="search"
        (input)="onSearch($any($event.target).value)"
        placeholder="Search staff by name"
        class="w-full text-sm rounded border border-gray-300 bg-gray-50 pl-9 pr-3 py-2 focus:outline-none focus:ring-2 focus:ring-d-red focus:border-transparent"
      />
    </div>
  </div>

  @if (users.length === 0) {
    <div class="px-4 sm:px-6 py-10 text-center">
      <p class="text-sm text-gray-700">No staff match your search.</p>
    </div>
  } @else {
    <ul class="divide-y divide-gray-100">
      @for (u of users; track trackById($index, u)) {
        <li class="px-4 sm:px-6 py-3 flex items-center gap-3">
          <!-- Name + phone -->
          <div class="min-w-0 flex-1">
            <p class="text-sm font-medium text-gray-900 truncate">{{ u.name }}</p>
            <p class="text-xs text-gray-500 truncate">+{{ u.user?.phone_number }}</p>
          </div>

          <!-- Roles -->
          <div class="hidden sm:flex flex-wrap justify-end gap-1 max-w-[40%]">
            @for (r of u.roles; track r) {
              <span class="text-[11px] font-medium rounded-full px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-200">{{ roleLabel(r) }}</span>
            }
          </div>

          <!-- Status -->
          <span class="inline-flex items-center gap-1.5 text-xs text-gray-600 shrink-0">
            <span class="h-2 w-2 rounded-full" [ngClass]="u.active ? 'bg-green-500' : 'bg-gray-400'"></span>
            <span class="hidden md:inline">{{ u.active ? 'Active' : 'Inactive' }}</span>
          </span>

          <!-- Actions -->
          <div class="flex items-center shrink-0">
            <button
              type="button"
              (click)="openView(u)"
              class="text-gray-500 desktop-hover:text-gray-900 p-1.5 rounded"
              aria-label="View details"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            </button>
            <button
              type="button"
              (click)="openEdit(u)"
              class="text-gray-500 desktop-hover:text-gray-900 p-1.5 rounded"
              aria-label="Edit staff"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="m18.5 2.5 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button
              type="button"
              (click)="openDelete(u)"
              class="text-gray-500 desktop-hover:text-d-red p-1.5 rounded"
              aria-label="Remove staff"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </li>
      }
    </ul>
  }
</app-settings-section-page>

<app-staff-form-dialog
  [open]="formOpen"
  [editing]="editingStaff"
  [restaurant]="restaurant"
  (closed)="onFormClosed()"
  (saved)="onSaved()"
  (created)="onCreated($event)"
></app-staff-form-dialog>

<app-staff-credential-dialog
  [open]="credentialOpen"
  [name]="credentialName"
  [tempPassword]="credentialTempPassword"
  (closed)="onCredentialClosed()"
></app-staff-credential-dialog>

<app-staff-detail-dialog
  [open]="detailOpen"
  [staff]="detailStaff"
  (closed)="onDetailClosed()"
></app-staff-detail-dialog>

<app-staff-remove-dialog
  [open]="removeOpen"
  [staff]="removeStaff"
  [removing]="removing"
  (cancelled)="onRemoveCancelled()"
  (confirmed)="onRemoveConfirmed($event)"
></app-staff-remove-dialog>
