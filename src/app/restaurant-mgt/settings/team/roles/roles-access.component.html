<app-settings-section-page
  title="Roles & access"
  description="Choose which modules each role can use. The owner always has full access."
  icon="staff"
  [state]="loadState"
  errorMessage="We couldn't load roles & access. Please try again."
  (retry)="load()"
>
  <div class="px-4 py-4 sm:px-6">
    <!-- Staleness hint (informational, not a warning): the permissions map is a
         login-time snapshot, so an edit only re-shapes a logged-in user at their
         next sign-in. Make that legible at the point of action. -->
    <p
      class="mb-4 flex items-start gap-2 rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm text-gray-600"
      role="note"
    >
      <svg class="mt-0.5 h-4 w-4 shrink-0 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10" />
        <path d="M12 16v-4" />
        <path d="M12 8h.01" />
      </svg>
      <span>Changes apply when affected users next sign in.</span>
    </p>

    <!-- Grid: 4 roles × 7 modules. Horizontally scrollable on narrow screens.
         Explicit px row heights (root font-size is 14px, so rem heights drift). -->
    <div class="overflow-x-auto">
      <table class="w-full border-collapse text-sm">
        <thead>
          <tr class="h-[44px] border-b border-gray-200">
            <th scope="col" class="sticky left-0 z-10 bg-card px-3 text-left font-medium text-gray-500">
              Role
            </th>
            <th *ngFor="let col of columns" scope="col" class="px-3 text-center font-medium text-gray-500 whitespace-nowrap">
              {{ col.label }}
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of rows" class="h-[52px] border-b border-gray-100 last:border-0">
            <th scope="row" class="sticky left-0 z-10 bg-card px-3 text-left font-medium text-gray-900 whitespace-nowrap">
              {{ roleLabel(row.role) }}
              <span *ngIf="!row.editable" class="ml-2 align-middle text-xs font-normal text-gray-400">Locked</span>
            </th>
            <td *ngFor="let col of columns" class="px-3 text-center">
              <div class="flex justify-center">
                <app-dn-switch
                  [checked]="isOn(row, col.key)"
                  [disabled]="!row.editable"
                  (checkedChange)="onToggle(row, col.key, $event)"
                ></app-dn-switch>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</app-settings-section-page>
