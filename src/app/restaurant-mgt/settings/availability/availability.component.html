<app-settings-section-page
  title="Availability"
  description="Control when your restaurant takes orders and your weekly opening hours."
  icon="availability"
  [state]="loadState"
  [dirty]="isDirty"
  [saving]="saving"
  errorMessage="We couldn't load your availability settings."
  (save)="onSave()"
  (discard)="onDiscard()"
  (retry)="retry()"
>
  <!-- ── Ordering ───────────────────────────────────────────────────────── -->
  <section class="px-4 sm:px-6 py-5 border-b border-gray-200">
    <h2 class="text-section-title text-foreground">Ordering</h2>
    <p class="text-sm text-gray-500 mt-0.5">
      Pause your restaurant when you can't take new orders.
    </p>

    <div
      class="mt-4 flex items-start justify-between gap-4 rounded-lg border border-gray-200 p-4"
    >
      <div>
        <p class="text-sm font-medium text-gray-900">Accepting orders</p>
        <p class="text-xs text-gray-400 mt-0.5">
          When off, your restaurant is paused and won't take new orders. You can
          turn it back on anytime.
        </p>
      </div>
      <app-dn-switch
        [checked]="acceptingOrders"
        (checkedChange)="onToggle($event)"
      ></app-dn-switch>
    </div>
  </section>

  <!-- ── Opening hours ──────────────────────────────────────────────────── -->
  <section class="px-4 sm:px-6 py-5">
    <h2 class="text-section-title text-foreground">Opening hours</h2>
    <p class="text-sm text-gray-500 mt-0.5">
      Set your weekly schedule. Mark a day Closed to skip it — its hours are kept
      for when you reopen.
    </p>

    <div class="mt-4">
      <app-opening-hours-editor [form]="hoursForm"></app-opening-hours-editor>
    </div>
  </section>
</app-settings-section-page>
