<app-dn-dialog [open]="open" maxWidth="md" (closed)="onClose()">
  @if (staff) {
    <div class="space-y-4">
      <div class="flex items-start justify-between gap-3">
        <h3 class="text-base font-semibold text-gray-900">Staff details</h3>
        <button
          type="button"
          class="text-gray-400 hover:text-gray-700 p-1 -mr-1 -mt-1 rounded"
          (click)="onClose()"
          aria-label="Close"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <dl class="divide-y divide-gray-100 text-sm">
        <div class="flex items-start justify-between gap-4 py-2">
          <dt class="text-gray-500">Name</dt>
          <dd class="text-gray-900 text-right">{{ staff.name }}</dd>
        </div>
        <div class="flex items-start justify-between gap-4 py-2">
          <dt class="text-gray-500">Phone number</dt>
          <dd class="text-gray-900 text-right">+{{ staff.user?.phone_number }}</dd>
        </div>
        <div class="flex items-start justify-between gap-4 py-2">
          <dt class="text-gray-500">Email</dt>
          <dd class="text-gray-900 text-right break-all">{{ staff.user?.email || '—' }}</dd>
        </div>
        <div class="flex items-start justify-between gap-4 py-2">
          <dt class="text-gray-500">Roles</dt>
          <dd class="text-gray-900 text-right">
            <div class="flex flex-wrap justify-end gap-1">
              @for (r of staff.roles; track r) {
                <span class="text-[11px] font-medium rounded-full px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-200">{{ roleLabel(r) }}</span>
              } @empty {
                <span class="text-gray-400">—</span>
              }
            </div>
          </dd>
        </div>
        <div class="flex items-start justify-between gap-4 py-2">
          <dt class="text-gray-500">Status</dt>
          <dd class="text-gray-900 text-right">
            <span class="inline-flex items-center gap-1.5">
              <span class="h-2 w-2 rounded-full" [ngClass]="staff.active ? 'bg-green-500' : 'bg-gray-400'"></span>
              {{ staff.active ? 'Active' : 'Inactive' }}
            </span>
          </dd>
        </div>
      </dl>

      <div class="flex items-center justify-end pt-2 border-t border-gray-100">
        <button
          type="button"
          class="px-3 py-2 text-sm rounded border border-gray-300 text-gray-700 hover:bg-gray-50"
          (click)="onClose()"
        >Close</button>
      </div>
    </div>
  }
</app-dn-dialog>
