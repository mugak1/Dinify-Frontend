@let compareOn = (compareEnabled$ | async) ?? true;

<header class="mb-4 sm:mb-6">
  <h1 class="text-2xl font-semibold text-gray-900">Sales</h1>
  <p class="text-sm text-gray-500 mt-1">Your sales for the selected period.</p>
</header>

@if (ready) {
  <!-- Hero + revenue trend -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6 mb-4 sm:mb-6">
    <app-sales-hero
      class="block lg:col-span-1"
      [current]="current"
      [previous]="previous"
      [refunds]="refunds"
      [previousRefunds]="prevRefunds"
      [comparisonLabel]="comparisonLabel"
      [compareEnabled]="compareOn"
    ></app-sales-hero>
    <app-revenue-trend-card
      class="block lg:col-span-2"
      [points]="trendPoints"
      [comparisonPoints]="trendComparisonPoints"
      [comparisonLabel]="comparisonLabel"
      [compareEnabled]="compareOn"
    ></app-revenue-trend-card>
  </div>

  <!-- KPI rail -->
  <div class="mb-4 sm:mb-6">
    <app-sales-kpi-rail [points]="kpiPoints" [current]="current" [previous]="previous" [compareEnabled]="compareOn"></app-sales-kpi-rail>
  </div>

  <!-- Cycles: weekday (when meaningful) + hour-of-day -->
  <div class="grid grid-cols-1 gap-4 sm:gap-6 mb-4 sm:mb-6" [class.lg:grid-cols-2]="showWeekday">
    @if (showWeekday) {
      <app-revenue-weekday-card [days]="weekdayDays" [bestWeekday]="weekdayBest"></app-revenue-weekday-card>
    }
    <app-orders-by-hour-card [bars]="hourBars" [peakHour]="hourPeak"></app-orders-by-hour-card>
  </div>

  <!-- Breakdown table -->
  <app-sales-breakdown-card
    [title]="breakdownTitle"
    [periodLabel]="breakdownPeriodLabel"
    [rows]="breakdownRows"
    [totals]="breakdownTotalsRec"
    [bestKey]="breakdownBestKey"
    [exportColumns]="exportColumns"
    [exportRows]="exportRows"
    [range]="range"
    [exportDisabled]="exportDisabled"
    [exportDisabledReason]="exportDisabledReason"
  ></app-sales-breakdown-card>
} @else {
  <app-report-state [mode]="stateMode" (retry)="retry()"></app-report-state>
}
