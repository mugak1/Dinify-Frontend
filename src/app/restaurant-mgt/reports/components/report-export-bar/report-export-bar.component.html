<!--
  The tooltip sits on the WRAPPER, not the buttons: disabled app-dn-buttons get
  `pointer-events-none`, so a tooltip bound to them would never fire on hover.
-->
<div class="flex items-center gap-2" [appTooltip]="disabled ? disabledReason : ''">
  <button
    app-dn-button
    type="button"
    variant="outline"
    size="sm"
    [disabled]="disabled"
    (click)="onExportXlsx()"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="h-3.5 w-3.5 mr-1.5"
    >
      <rect width="18" height="18" x="3" y="3" rx="2" />
      <path d="M3 9h18" />
      <path d="M3 15h18" />
      <path d="M9 3v18" />
      <path d="M15 3v18" />
    </svg>
    Export XLSX
  </button>

  <button
    app-dn-button
    type="button"
    variant="outline"
    size="sm"
    [disabled]="disabled"
    (click)="onExportCsv()"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="h-3.5 w-3.5 mr-1.5"
    >
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="7 10 12 15 17 10" />
      <line x1="12" x2="12" y1="15" y2="3" />
    </svg>
    Export CSV
  </button>

  <button
    app-dn-button
    type="button"
    variant="outline"
    size="sm"
    [disabled]="disabled"
    (click)="onPrint()"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="h-3.5 w-3.5 mr-1.5"
    >
      <polyline points="6 9 6 2 18 2 18 9" />
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
      <rect width="12" height="8" x="6" y="14" />
    </svg>
    Print
  </button>
</div>
