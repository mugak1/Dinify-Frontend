<header class="mb-4 sm:mb-6 flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
  <div>
    <h1 class="text-2xl font-semibold text-gray-900">Transactions</h1>
    <p class="text-sm text-gray-500 mt-1">Payments and refunds over the selected period.</p>
  </div>
  <app-report-export-bar
    [columns]="exportColumns"
    [rows]="listingRows"
    [totals]="listingTotals"
    reportTitle="Transactions"
    [range]="range"
    [disabled]="!listingReady"
    disabledReason="Nothing to export for this range."
  ></app-report-export-bar>
</header>

@if (summaryReady) {
  <!-- Chip rail: 4 range-aggregate chips with deltas -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4 sm:mb-6">
    <app-dn-card class="block">
      <div class="p-4">
        <div class="flex items-center justify-between gap-2">
          <p class="text-sm text-gray-500">Transactions</p>
          <app-report-delta-chip
            [current]="metrics.count"
            [previous]="prevMetrics?.count ?? 0"
            [label]="comparisonLabel"
          ></app-report-delta-chip>
        </div>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 tabular-nums mt-1">{{ metrics.count | number }}</p>
      </div>
    </app-dn-card>

    <app-dn-card class="block">
      <div class="p-4">
        <div class="flex items-center justify-between gap-2">
          <p class="text-sm text-gray-500">Gross collected</p>
          <app-report-delta-chip
            [current]="metrics.gross"
            [previous]="prevMetrics?.gross ?? 0"
            [label]="comparisonLabel"
          ></app-report-delta-chip>
        </div>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 tabular-nums mt-1">{{ fmt(metrics.gross) }}</p>
      </div>
    </app-dn-card>

    <app-dn-card class="block">
      <div class="p-4">
        <div class="flex items-center justify-between gap-2">
          <p class="text-sm text-gray-500">Avg ticket</p>
          <app-report-delta-chip
            [current]="metrics.avgTicket"
            [previous]="prevMetrics?.avgTicket ?? 0"
            [label]="comparisonLabel"
          ></app-report-delta-chip>
        </div>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 tabular-nums mt-1">{{ fmt(metrics.avgTicket) }}</p>
      </div>
    </app-dn-card>

    <app-dn-card class="block">
      <div class="p-4">
        <div class="flex items-center justify-between gap-2">
          <p class="text-sm text-gray-500">Refunds</p>
          <app-report-delta-chip
            [current]="metrics.refunds"
            [previous]="prevMetrics?.refunds ?? 0"
            [invert]="true"
            [label]="comparisonLabel"
          ></app-report-delta-chip>
        </div>
        <p class="text-xl sm:text-2xl font-semibold text-gray-900 tabular-nums mt-1">{{ fmt(metrics.refunds) }}</p>
        <p class="text-xs text-gray-400 mt-1">On-platform refunds only</p>
      </div>
    </app-dn-card>
  </div>

  <!-- Status breakdown + recent transactions -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 items-start">
    <app-transactions-status-breakdown [breakdown]="breakdown"></app-transactions-status-breakdown>
    <app-transactions-listing
      [rows]="listingRows"
      [totals]="listingTotals"
      [ready]="listingReady"
      [state]="listingState"
      [selectedChip]="selectedChip"
      [capped]="listingCapped"
      (filterChange)="onFilter($event)"
      (retry)="retry()"
    ></app-transactions-listing>
  </div>
} @else {
  <app-report-state
    [mode]="summaryState"
    title="No transactions yet"
    message="No payments were recorded in the dates you selected."
    (retry)="retry()"
  ></app-report-state>
}
