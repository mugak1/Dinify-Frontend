@let compareOn = (compareEnabled$ | async) ?? true;

<app-page-header
  class="block mb-4 sm:mb-6"
  title="Menu performance"
  description="How your menu sold over the selected period."
>
  <app-report-export-bar
    actions
    [columns]="exportColumns"
    [rows]="exportRows"
    [totals]="exportTotals"
    reportTitle="Menu performance"
    [range]="range"
    [disabled]="!ready"
    disabledReason="Nothing to export for this range."
  ></app-report-export-bar>
</app-page-header>

@if (ready) {
  <!-- Chip rail: 3 range-aggregate + 1 point-in-time -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4 sm:mb-6">
    <app-menu-stat-card
      label="Items sold"
      [value]="(current.units | number) ?? ''"
      [current]="current.units"
      [previous]="previous?.units ?? 0"
      [comparisonLabel]="comparisonLabel"
      [compareEnabled]="compareOn"
    ></app-menu-stat-card>
    <app-menu-stat-card
      label="Menu revenue"
      [value]="fmt(current.revenue)"
      [current]="current.revenue"
      [previous]="previous?.revenue ?? 0"
      [comparisonLabel]="comparisonLabel"
      [compareEnabled]="compareOn"
    ></app-menu-stat-card>
    <app-menu-stat-card
      label="Avg item price"
      [value]="fmt(current.avgPrice)"
      [current]="current.avgPrice"
      [previous]="previous?.avgPrice ?? 0"
      [comparisonLabel]="comparisonLabel"
      [compareEnabled]="compareOn"
    ></app-menu-stat-card>
    <app-menu-stat-card
      label="Active items"
      [value]="activeCount + ' active'"
      [subtext]="outOfStockCount + ' out of stock'"
      caption="as of now"
    ></app-menu-stat-card>
  </div>

  <!-- Top selling items + category breakdown / full menu -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 items-start">
    <app-menu-top-items [items]="items" (fullMenu)="showFullMenu()"></app-menu-top-items>
    <app-menu-category
      [grouping]="grouping"
      [bars]="bars"
      [itemRows]="items"
      (groupingChange)="onGrouping($event)"
    ></app-menu-category>
  </div>
} @else {
  <app-report-state
    [mode]="state"
    title="No menu activity yet"
    message="No items were ordered in the dates you selected."
    (retry)="retry()"
  ></app-report-state>
}
