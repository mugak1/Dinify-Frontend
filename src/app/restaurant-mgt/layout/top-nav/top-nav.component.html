<header
  class="sticky top-0 z-30 bg-background px-3 sm:px-4 md:px-6"
  [ngClass]="compact ? 'py-1.5 md:py-2' : 'py-3 md:py-4'"
>
  <div
    class="flex flex-col md:flex-row md:items-center"
    [ngClass]="compact ? 'gap-2 md:gap-3' : 'gap-3 md:gap-4'"
  >
    <!-- Row 1: Menu button + Date filters -->
    <div class="flex items-center gap-2 sm:gap-4 flex-1">
      <button
        (click)="menuClick.emit()"
        class="xl:hidden p-2 -ml-2 rounded-md hover:bg-accent transition-colors flex-shrink-0"
        aria-label="Toggle sidebar"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" x2="20" y1="12" y2="12"/>
          <line x1="4" x2="20" y1="6" y2="6"/>
          <line x1="4" x2="20" y1="18" y2="18"/>
        </svg>
      </button>

      <!-- Date range pills (dashboard only) -->
      @if (dashboardService.isDashboardActive$ | async) {
        <div class="overflow-x-auto">
          <app-dn-segmented
            [items]="ranges"
            [value]="(dashboardService.dateRange$ | async)!"
            (valueChange)="onDateRangeChange($any($event))"
            ariaLabel="Date range selector"
            layout="hug"
          ></app-dn-segmented>
        </div>
      }

      <!-- Right side: projected content + the current restaurant name. The name
           is surfaced here so a multi-venue operator always sees which venue they
           are editing, and it fills the otherwise-empty band on non-dashboard
           pages. Right-aligned so it never collides with the date pills. -->
      <div class="flex-1 flex items-center justify-end gap-3 min-w-0">
        <ng-content></ng-content>
        <span
          *ngIf="restaurantName as name"
          class="min-w-0 truncate text-sm font-medium text-foreground max-w-[45vw] sm:max-w-[240px]"
          [title]="name"
        >{{ name }}</span>
      </div>
    </div>
  </div>
</header>
