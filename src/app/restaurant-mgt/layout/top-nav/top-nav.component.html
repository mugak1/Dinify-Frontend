<header
  class="sticky top-0 z-30 bg-background px-3 sm:px-4 md:px-6"
  [ngClass]="compact ? 'py-1.5 md:py-2' : 'py-3 md:py-4'"
>
  <div
    class="flex flex-col md:flex-row md:items-center"
    [ngClass]="compact ? 'gap-2 md:gap-3' : 'gap-3 md:gap-4'"
  >
    <!-- Row 1: Menu button + Date filters -->
    <div class="flex items-center gap-2 sm:gap-4 flex-1">
      <button
        (click)="menuClick.emit()"
        class="xl:hidden p-2 -ml-2 rounded-md hover:bg-accent transition-colors flex-shrink-0"
        aria-label="Toggle sidebar"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" x2="20" y1="12" y2="12"/>
          <line x1="4" x2="20" y1="6" y2="6"/>
          <line x1="4" x2="20" y1="18" y2="18"/>
        </svg>
      </button>

      <!-- Date range pills (dashboard only) -->
      @if (dashboardService.isDashboardActive$ | async) {
        <div class="bg-card border border-gray-200 rounded-lg p-1 flex gap-1 overflow-x-auto" role="tablist" aria-label="Date range selector">
          @for (range of ranges; track range.value) {
            <button
              (click)="onDateRangeChange(range.value)"
              class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-medium transition-all whitespace-nowrap flex-shrink-0 active:scale-95"
              [class]="(dashboardService.dateRange$ | async) === range.value
                ? 'bg-primary text-primary-foreground shadow-sm'
                : 'text-foreground hover:text-foreground'"
              role="tab"
              [attr.aria-selected]="(dashboardService.dateRange$ | async) === range.value"
            >
              {{ range.label }}
            </button>
          }
        </div>
      }

      <!-- Spacer for ng-content when not on dashboard -->
      <div class="flex-1 flex items-center">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</header>
