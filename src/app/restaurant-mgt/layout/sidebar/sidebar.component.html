<!-- Wrapper: fixed overlay drawer <xl (slides in via translate-x), in-flow
xl:relative rail >=xl. This fixed/relative position also anchors the
absolute toggle button. -->
<div class="group flex-none fixed xl:relative inset-y-0 left-0 z-50 transition-transform duration-300 xl:translate-x-0"
  [ngClass]="{ '-translate-x-full': !isOpen }">

  <aside class="bg-sidebar text-sidebar-foreground flex flex-col h-full transition-all duration-300 border-r border-sidebar-border"
    [style.width.px]="isOpen ? 220 : 64">

    <!-- Logo header -->
    <div class="flex items-center h-16 px-4 border-b border-sidebar-border"
      [ngClass]="{ 'justify-center': !isOpen }">
      <!-- Expanded: full logo (emblem + wordmark) -->
      @if (isOpen) {
        <a [href]="auth.firstAccessibleRoute()" class="flex items-center overflow-hidden">
          <img src="assets/images/dinify-logo-dark-background.svg" alt="Dinify" class="h-[24px] w-auto max-w-[140px]" />
        </a>
      }
      <!-- Collapsed: emblem only -->
      @if (!isOpen) {
        <a [href]="auth.firstAccessibleRoute()" class="flex items-center justify-center w-full">
          <img src="assets/images/dinify-emblem.svg" alt="Dinify" class="h-[24px] w-[24px]" />
        </a>
      }
    </div>

    <!-- Nav items -->
    <nav aria-label="Primary" class="flex-1 py-5 space-y-2 overflow-y-auto no-scrollbar"
      [ngClass]="isOpen ? 'px-4' : 'px-2'">
      @for (item of visibleNavItems; track item) {
        <a
          [routerLink]="item.route" routerLinkActive="bg-sidebar-accent font-medium"
          #rla="routerLinkActive" ariaCurrentWhenActive="page"
          class="relative flex items-center rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
          [ngClass]="isOpen ? 'gap-3 px-3 py-2' : 'justify-center mx-auto h-[40px] w-[40px]'"
          [appTooltip]="!isOpen ? item.label : ''">
          @if (rla.isActive && isOpen) {
            <span aria-hidden="true"
            class="absolute left-0 top-1/2 -translate-y-1/2 h-5 w-[3px] rounded-r bg-d-red"></span>
          }
          <svg aria-hidden="true" class="w-5 h-5 shrink-0" [class.text-d-red]="rla.isActive" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            @switch (item.icon) {
              @case ('dashboard') {
                <ng-container><svg:rect width="7" height="9" x="3" y="3" rx="1"/><svg:rect width="7" height="5" x="14" y="3" rx="1"/><svg:rect width="7" height="9" x="14" y="12" rx="1"/><svg:rect width="7" height="5" x="3" y="16" rx="1"/></ng-container>
              }
              @case ('menu') {
                <ng-container><svg:path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><svg:path d="M7 2v20"/><svg:path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></ng-container>
              }
              @case ('tables') {
                <ng-container><svg:rect width="18" height="18" x="3" y="3" rx="2"/><svg:path d="M3 9h18"/><svg:path d="M3 15h18"/><svg:path d="M9 3v18"/><svg:path d="M15 3v18"/></ng-container>
              }
              @case ('kitchen') {
                <ng-container><svg:path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><svg:line x1="6" x2="18" y1="17" y2="17"/></ng-container>
              }
              @case ('reviews') {
                <ng-container><svg:path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a.53.53 0 0 0 .4.29l5.16.752a.53.53 0 0 1 .294.904l-3.733 3.638a.53.53 0 0 0-.152.469l.882 5.14a.53.53 0 0 1-.77.56l-4.613-2.426a.53.53 0 0 0-.494 0l-4.614 2.426a.53.53 0 0 1-.769-.56l.881-5.14a.53.53 0 0 0-.152-.47L3.36 8.92a.53.53 0 0 1 .294-.905l5.16-.751a.53.53 0 0 0 .4-.29z"/></ng-container>
              }
              @case ('reports') {
                <ng-container><svg:path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><svg:path d="M14 2v4a2 2 0 0 0 2 2h4"/><svg:path d="M8 18v-2"/><svg:path d="M12 18v-4"/><svg:path d="M16 18v-6"/></ng-container>
              }
              @case ('support') {
                <ng-container><svg:circle cx="12" cy="12" r="10"/><svg:path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><svg:path d="M12 17h.01"/></ng-container>
              }
              @case ('settings') {
                <ng-container><svg:path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><svg:circle cx="12" cy="12" r="3"/></ng-container>
              }
            }
          </svg>
          <span class="text-sm truncate" [class.sr-only]="!isOpen" [class.text-white]="rla.isActive">{{ item.label }}</span>
        </a>
      }

      <!-- No-modules note: a membership whose permissions grant no module (same
      predicate as the /account landing) sees only Support above + this. -->
      @if (noModuleUser && isOpen) {
        <p
          class="px-3 py-2 text-xs leading-snug text-sidebar-foreground/70">
          No modules assigned — contact your owner.
        </p>
      }
    </nav>

    <!-- Account chip: pinned to the bottom (nav is flex-1), links to the account page -->
    <a [routerLink]="'/account'"
      routerLinkActive="bg-sidebar-accent text-sidebar-primary" ariaCurrentWhenActive="page"
      class="relative flex items-center h-[64px] border-t border-sidebar-border transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
      [ngClass]="isOpen ? 'gap-3 px-4' : 'justify-center px-2'"
      [appTooltip]="!isOpen ? (chipName || 'Account') : ''">
      <app-dn-avatar size="sm" variant="brand" [name]="chipName"></app-dn-avatar>
      <div class="flex flex-col min-w-0" [class.sr-only]="!isOpen">
        <span class="text-sm font-medium truncate">{{ chipName || 'Account' }}</span>
        @if (chipRole) {
          <span class="text-xs uppercase tracking-wide text-sidebar-foreground/60 truncate">{{ chipRole }}</span>
        }
      </div>
    </a>
  </aside>

  <!-- Toggle button: OUTSIDE aside, INSIDE wrapper.
  rounded-full is a DELIBERATE exception to the project's rounded-none default —
  keep the toggle circular; do not square it in a future cleanup pass. The
  near-white fill + 1px neutral border make it pop off the black rail while
  staying delineated from the white canvas at the seam (flat, no drop shadow).
  Position (absolute top-5 -right-3) is unchanged. -->
  <button (click)="sidebarToggle.emit()"
    [attr.aria-label]="isOpen ? 'Collapse sidebar' : 'Expand sidebar'"
    [attr.aria-expanded]="isOpen"
    [attr.title]="isOpen ? 'Collapse sidebar' : 'Expand sidebar'"
    class="absolute top-5 -right-3 z-10 hidden xl:flex items-center justify-center w-[32px] h-[32px] rounded-full bg-white border border-neutral-300 text-neutral-900 desktop-hover:border-d-red desktop-hover:text-d-red focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-d-red transition-colors">
    <svg aria-hidden="true" class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
      <path [attr.d]="isOpen ? 'm11 17-5-5 5-5' : 'm6 17 5-5-5-5'"/>
      <path [attr.d]="isOpen ? 'm18 17-5-5 5-5' : 'm13 17 5-5-5-5'"/>
    </svg>
  </button>

</div>
