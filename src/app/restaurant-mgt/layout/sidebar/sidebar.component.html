<!-- Wrapper div: relative for toggle button positioning -->
<div class="group relative flex-none fixed lg:relative inset-y-0 left-0 z-50"
     [ngClass]="{ 'hidden lg:block': !isOpen }">

  <aside class="bg-sidebar text-sidebar-foreground flex flex-col h-full transition-all duration-300 border-r border-sidebar-border"
         [style.width.px]="isOpen ? 220 : 64">

    <!-- Logo header -->
    <div class="flex items-center h-16 px-4 border-b border-sidebar-border"
         [ngClass]="{ 'justify-center': !isOpen }">
      <!-- Expanded: full logo (emblem + wordmark) -->
      <a *ngIf="isOpen" [href]="auth.firstAccessibleRoute()" class="flex items-center overflow-hidden">
        <img src="assets/images/dinify-logo-dark-background.svg" alt="Dinify" class="h-8 w-auto max-w-[140px]" />
      </a>
      <!-- Collapsed: emblem only -->
      <a *ngIf="!isOpen" [href]="auth.firstAccessibleRoute()" class="flex items-center justify-center w-full">
        <img src="assets/images/dinify-emblem.svg" alt="Dinify" class="h-8 w-8" />
      </a>
    </div>

    <!-- Nav items -->
    <nav aria-label="Primary" class="flex-1 py-5 space-y-2 overflow-y-auto no-scrollbar"
         [ngClass]="isOpen ? 'px-4' : 'px-2'">
      <a *ngFor="let item of visibleNavItems"
         [routerLink]="item.route" routerLinkActive="bg-sidebar-accent text-sidebar-primary font-medium"
         #rla="routerLinkActive" ariaCurrentWhenActive="page"
         class="relative flex items-center rounded-lg transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
         [ngClass]="isOpen ? 'gap-3 px-3 py-2' : 'justify-center mx-auto h-[40px] w-[40px]'"
         [appTooltip]="!isOpen ? item.label : ''">
        <span *ngIf="rla.isActive && isOpen" aria-hidden="true"
              class="absolute left-0 top-1/2 -translate-y-1/2 h-5 w-[3px] rounded-r bg-sidebar-primary"></span>
        <svg aria-hidden="true" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [ngSwitch]="item.icon">
          <ng-container *ngSwitchCase="'dashboard'"><svg:rect width="7" height="9" x="3" y="3" rx="1"/><svg:rect width="7" height="5" x="14" y="3" rx="1"/><svg:rect width="7" height="9" x="14" y="12" rx="1"/><svg:rect width="7" height="5" x="3" y="16" rx="1"/></ng-container>
          <ng-container *ngSwitchCase="'menu'"><svg:path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><svg:path d="M7 2v20"/><svg:path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></ng-container>
          <ng-container *ngSwitchCase="'tables'"><svg:rect width="18" height="18" x="3" y="3" rx="2"/><svg:path d="M3 9h18"/><svg:path d="M3 15h18"/><svg:path d="M9 3v18"/><svg:path d="M15 3v18"/></ng-container>
          <ng-container *ngSwitchCase="'reviews'"><svg:path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a.53.53 0 0 0 .4.29l5.16.752a.53.53 0 0 1 .294.904l-3.733 3.638a.53.53 0 0 0-.152.469l.882 5.14a.53.53 0 0 1-.77.56l-4.613-2.426a.53.53 0 0 0-.494 0l-4.614 2.426a.53.53 0 0 1-.769-.56l.881-5.14a.53.53 0 0 0-.152-.47L3.36 8.92a.53.53 0 0 1 .294-.905l5.16-.751a.53.53 0 0 0 .4-.29z"/></ng-container>
          <ng-container *ngSwitchCase="'reports'"><svg:path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><svg:path d="M14 2v4a2 2 0 0 0 2 2h4"/><svg:path d="M8 18v-2"/><svg:path d="M12 18v-4"/><svg:path d="M16 18v-6"/></ng-container>
          <ng-container *ngSwitchCase="'support'"><svg:circle cx="12" cy="12" r="10"/><svg:path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><svg:path d="M12 17h.01"/></ng-container>
          <ng-container *ngSwitchCase="'settings'"><svg:path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><svg:circle cx="12" cy="12" r="3"/></ng-container>
        </svg>
        <span class="text-sm truncate" [class.sr-only]="!isOpen">{{ item.label }}</span>
      </a>

      <!-- No-modules note: a membership whose permissions grant no module (same
           predicate as the /account landing) sees only Support above + this. -->
      <p *ngIf="noModuleUser && isOpen"
         class="px-3 py-2 text-xs leading-snug text-sidebar-foreground/70">
        No modules assigned — contact your owner.
      </p>
    </nav>

    <!-- Account chip: pinned to the bottom (nav is flex-1), links to the account page -->
    <a [routerLink]="'/rest-app/account'"
       routerLinkActive="bg-sidebar-accent text-sidebar-primary" ariaCurrentWhenActive="page"
       class="relative flex items-center h-[64px] border-t border-sidebar-border transition-colors text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground"
       [ngClass]="isOpen ? 'gap-3 px-4' : 'justify-center px-2'"
       [appTooltip]="!isOpen ? (chipName || 'Account') : ''">
      <app-dn-avatar size="sm" [name]="chipName"></app-dn-avatar>
      <div class="flex flex-col min-w-0" [class.sr-only]="!isOpen">
        <span class="text-sm font-medium truncate">{{ chipName || 'Account' }}</span>
        <span *ngIf="chipRole" class="text-xs uppercase tracking-wide text-sidebar-foreground/60 truncate">{{ chipRole }}</span>
      </div>
    </a>
  </aside>

  <!-- Toggle button: OUTSIDE aside, INSIDE wrapper -->
  <button (click)="sidebarToggle.emit()"
          aria-label="Toggle sidebar" [attr.aria-expanded]="isOpen"
          class="absolute top-5 -right-3 z-10 bg-sidebar ring-1 ring-sidebar-border focus-visible:ring-2 focus-visible:ring-sidebar-ring rounded-full w-6 h-6 hover:bg-sidebar-accent text-sidebar-foreground/70 hover:text-sidebar-foreground shadow-sm hidden lg:flex items-center justify-center opacity-50 hover:opacity-100 focus:opacity-100 focus-visible:opacity-100 group-hover:opacity-100 transition-opacity duration-200">
    <svg aria-hidden="true" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path [attr.d]="isOpen ? 'm11 17-5-5 5-5' : 'm6 17 5-5-5-5'"/>
      <path [attr.d]="isOpen ? 'm18 17-5-5 5-5' : 'm13 17 5-5-5-5'"/>
    </svg>
  </button>

</div>
