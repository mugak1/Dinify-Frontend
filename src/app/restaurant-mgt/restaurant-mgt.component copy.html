  <!-- Main Layout Container -->
  <div class="flex flex-col flex-1 md:ml-72 lg:ml-32">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-10 h-16 lg:h-20 flex items-center px-4 lg:px-6 flex-shrink-0">
      <div class="flex items-center justify-between w-full">
        <!-- Restaurant Info -->
        <div *ngIf="auth.currentRestaurantRole?.restaurant_id" class="text-black flex font-bold text-2xl lg:text-3xl">
          <img *ngIf="auth.currentRestaurant?.logo" class="w-8 h-8 lg:w-10 lg:h-10 rounded-full border" [src]="baseUrl+auth.currentRestaurant.logo" alt="{{auth.currentRestaurant.name}}">
          <span class="ml-3 lg:ml-4">{{auth.currentRestaurantRole.restaurant|uppercase}}</span>
        </div>
        <!-- Right Actions -->
        <div class="flex items-center gap-3 ml-auto">
          <button [routerLink]="['notifications']" *ngIf="auth.currentRestaurantRole?.restaurant_id" class="p-2 hover:bg-gray-100 rounded-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
          </button>
          <button (click)="logout()" *ngIf="auth.currentRestaurantRole?.restaurant_id" class="p-2 hover:bg-gray-100 rounded-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 bg-gray-100 overflow-hidden">
      <div class="h-full w-full overflow-y-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- Mobile Sidebar Backdrop -->
  <div *ngIf="isMobileSidebarOpen && isMobileOrTablet" 
       (click)="closeMobileSidebar()"
       class="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden"></div>
</div>
