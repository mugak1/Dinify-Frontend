<div class="overflow-x-auto shadow-md sm:rounded-lg bg-white">
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 py-2 px-3 xl:px-6 bg-white">
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Reviews</h1>
        
        <div class="flex items-center gap-3 flex-wrap">
            
            <!-- Date Range Dropdown -->
            <div class="relative">
                <button type="button" (click)="toggleDateDropdown()" [attr.aria-expanded]="showDateDropdown" class="flex h-10 items-center justify-between rounded-md border border-gray-300 bg-white px-3 py-2 text-sm ring-offset-background placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 [&>span]:line-clamp-1 w-44">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar h-4 w-4 mr-2 text-gray-500"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path></svg>
                    <span style="pointer-events: none;">{{ selectedDateRange }}</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [class]="'lucide lucide-chevron-down h-4 w-4 transition-transform ' + (showDateDropdown ? 'rotate-180' : 'opacity-50')" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg>
                </button>
                
                <!-- Dropdown Menu -->
                <div *ngIf="showDateDropdown" class="absolute top-full right-0 mt-2 w-44 bg-white border border-gray-300 rounded-md shadow-lg z-10">
                    <ul class="py-1">
                        <li><button type="button" (click)="setDateRange(7)" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors">Last 7 days</button></li>
                        <li><button type="button" (click)="setDateRange(30)" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors">Last 30 days</button></li>
                        <li><button type="button" (click)="setDateRange(90)" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors">Last 90 days</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Stats Cards -->
    <div class="px-3 xl:px-6 py-2 xl:py-3 bg-white">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 xl:gap-3">
            <!-- Average Rating Card -->
            <div class="rounded-lg border border-gray-200 bg-white text-gray-900 shadow-sm hover:shadow-md transition-shadow">
                <div class="p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-600">Average Rating</p>
                            <div class="flex items-baseline gap-2 mt-2">
                                <span class="text-3xl font-bold text-gray-900">{{ summary?.average_rating?.toFixed(1) || '4.3' }}</span>
                                <span class="text-lg text-gray-500">/ 5</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">Weighted across platforms</p>
                        </div>
                        <div class="flex flex-col items-end">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star h-8 w-8 text-yellow-400 fill-yellow-400"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"></path></svg>
                            <div class="flex items-center gap-1 mt-2 text-sm text-green-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trending-up h-4 w-4"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
                                <span>+0.2</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Total Reviews Card -->
            <div class="rounded-lg border border-gray-200 bg-white text-gray-900 shadow-sm hover:shadow-md transition-shadow">
                <div class="p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-600">Total Reviews</p>
                            <div class="flex items-baseline gap-2 mt-2">
                                <span class="text-3xl font-bold text-gray-900">{{ summary?.total_ratings || '128' }}</span>
                                <span class="text-lg text-gray-500">reviews</span>
                            </div>
                            <p class="text-sm text-green-600 mt-2">+22% vs last period</p>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-square h-8 w-8 text-blue-500"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                </div>
            </div>

            <!-- Response Rate Card -->
            <div class="rounded-lg border border-gray-200 bg-white text-gray-900 shadow-sm hover:shadow-md transition-shadow">
                <div class="p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-600">Response Rate</p>
                            <div class="flex items-baseline gap-2 mt-2">
                                <span class="text-3xl font-bold text-gray-900">86%</span>
                            </div>
                            <p class="text-sm text-gray-600 mt-2">Avg time: 2h 15m</p>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock h-8 w-8 text-gray-400"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Reviews Management Component -->
    <app-reviews-management></app-reviews-management>

</div>
