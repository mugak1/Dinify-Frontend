<div class="bg-white rounded-lg py-5">
    <div class="container flex flex-col mx-auto bg-white rounded-lg my-5">
        <div class="flex justify-center w-full h-full my-auto xl:gap-14 lg:justify-normal md:gap-5 draggable">
            <div class="flex items-center justify-center w-full lg:p-12">
                <div class="flex items-center xl:p-10">
                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col w-full h-full pb-6 text-center bg-white rounded-3xl">
                        <svg class="mb-7" height="50" viewBox="0 0 495.95 121.55">

                            <path d="M267.38,2.83A11.77,11.77,0,0,0,252,2.89a9.54,9.54,0,0,0-3.07,7.25A9.64,9.64,0,0,0,252,17.49a11.65,11.65,0,0,0,15.38,0,9.74,9.74,0,0,0,3-7.35,9.61,9.61,0,0,0-3-7.31M251,97h17.25V30.65H251Z" />
                            <path d="M335.19,36.19c-4.27-4.65-10.14-7-17.62-7q-13.14,0-20.63,10.5v-9H279.69V97h17.25V62.14q0-16.55,15-16.54,6.61,0,9.53,3.38t2.89,10.13V97h17.25V55.38q0-12.18-6.39-19.19" />
                            <path d="M368.72,2.83a11.77,11.77,0,0,0-15.38.06,9.59,9.59,0,0,0-3.08,7.25,9.68,9.68,0,0,0,3.08,7.35,11.65,11.65,0,0,0,15.38,0,9.71,9.71,0,0,0,3-7.35,9.58,9.58,0,0,0-3-7.31M352.32,97h17.25V30.65H352.32Z" />
                            <path d="M410.65,17.74A30.49,30.49,0,0,1,419,19.06l2.29.6,3.13-14a37.46,37.46,0,0,0-15.68-3q-11.34,0-19.19,6.82t-7.84,20.09V97h17.25V51.93l-14.94-5h37V30.65H398.94v-.26q0-12.64,11.71-12.65" />
                            <polygon points="477.48 30.65 460.96 69.49 444.55 30.65 426.21 30.65 451.79 88.19 436.92 121.55 455.27 121.55 495.94 30.65 477.48 30.65" />
                            <path class="fill-d-red" d="M141.49,24.44a48.39,48.39,0,0,0-4-4.54A49.17,49.17,0,0,0,102.58,5.45H0L24.16,33.92a28.18,28.18,0,0,0,20.22,9.92l14.5.66a5.92,5.92,0,0,0,5.72-3.63,17.56,17.56,0,0,1,.82-1.73c3.44-5.86,10-9.68,20.93-9.68,18,0,41,10.29,41,23s-23,23-41,23c-10.17,0-16.55-3.31-20.16-8.48a18.16,18.16,0,0,1-1.72-3A6,6,0,0,0,58.8,60.4l-11.73.53,5.12,6,18,21.82a42,42,0,0,0,32.43,15.31A49.33,49.33,0,0,0,151.29,62.6a50.42,50.42,0,0,0,.62-7.82,49.15,49.15,0,0,0-10.42-30.34" />
                        </svg>
                        <!--  <h3 class="mb-3 text-4xl font-extrabold text-dark-grey-900">Sign In</h3> -->
                        <p class="mb-4 text-grey-700">Enter your phone number and password</p>
                       
                            <label class="mb-2 text-sm text-start text-grey-900">Phone number <span class="text-d-red">*</span></label>
                          <intl-telephone-input class="mb-3" [cssClass]="'rounded '+(submitted && loginForm.get('username')?.errors?.['required']?'border border-d-red':'')" [preferredCountries]="preferredCountries" [selectedCountryISO]="CountryISO.Uganda" [enableAutoCountrySelect]="true" [enablePlaceholder]="true" (onChange)="onInputChange($event)">
                          </intl-telephone-input>  
                         
                        <!-- <label for="email" class="mb-2 text-sm text-start text-grey-900">Email <span class="text-d-red">*</span> </label>
                        <input id="email" type="text" formControlName="username" placeholder="Enter your phone number"
                            class="flex items-center w-full px-5 py-4 mr-2 text-sm font-medium outline-none mb-7 focus:bg-white border placeholder:text-gray-700 bg-gray-100 text-gray-900 rounded" />
                            <div *ngIf="submitted && f['username'].errors" class="text-d-red text-xs">
                                <div *ngIf="f['username'].errors?.['required']">Email is required</div>
                            </div> -->
                        <label for="password" class="mb-2 text-sm text-start text-grey-900">Password <span class="text-d-red">*</span></label>
                        <input id="password" type="password" placeholder="Enter a password" formControlName="password"
                            class="flex items-center w-full px-5 py-4 mb-5 mr-2 font-medium outline-none focus:bg-white border placeholder:text-gray-700 bg-gray-100 text-gray-900 rounded" />
                            <div *ngIf="f['password']?.invalid&&f['password']?.errors?.['required']&&submitted" class="text-d-red text-xs"> 
                                Password is required 
                            </div>
                        <div class="flex flex-row justify-between mb-8 mt-7">
                            <div class="flex gap-2">
                                <input type="checkbox" id="some_id" class="relative peer shrink-0 appearance-none w-5 h-5 border-2 border-gray-400 rounded-sm bg-white checked:bg-gray-800 checked:border-0 focus:outline-none focus:ring-offset-0 focus:ring-2 focus:ring-blue-100 disabled:border-steel-400 disabled:bg-steel-400" />
                                <label class="text-sm font-normal" htmlFor="some_id">Keep me logged in</label>
                                <svg class=" absolute w-5 h-5 hidden peer-checked:block pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                            <a [routerLink]="['/forgot-password']" class="text-sm font-medium text-d-red">Forgot
                                password?</a>
                        </div>
                        <button class="w-full bg-d-red px-6 py-5 mb-5 text-sm font-bold leading-none text-white transition duration-300 md:w-96 rounded hover:bg-purple-blue-600 focus:ring-4 focus:ring-purple-blue-100 bg-purple-blue-500">Sign In</button>
                        <p class="text-sm leading-relaxed text-grey-900">Not registered yet? 
                        <a [routerLink]="['/register']" class="font-medium text-d-red">Create an Account</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

        <div class="w-full max-w-full sm:w-3/4 mx-auto text-center">
            <p class="text-sm text-slate-500 py-1">

        </div>
    </div> -->
</div>
