<!--
  Ticket card. Fills its grid slot (h-full flex-col); the item list scrolls
  internally so a tall multi-item order never breaks the page grid. Overdue uses
  a filled/pulsing treatment (not a bare red border) so it stays distinct from
  the red advance button — the red wash over the white card reads clearly.
-->
<article
  class="relative h-full flex flex-col rounded-xl border-2 overflow-hidden bg-white text-gray-900 shadow-lg"
  [ngClass]="{
    'border-gray-200': escalation === 'normal' && !isServed,
    'border-amber-500': escalation === 'warning',
    'border-red-500 ring-2 ring-red-500/60 kitchen-overdue': escalation === 'overdue',
    'border-gray-200 opacity-70': isServed
  }">

  <!-- Status accent strip -->
  <div
    class="h-[6px] w-full shrink-0"
    [ngClass]="{
      'bg-blue-400': ticket.fulfilment_status === 'new',
      'bg-amber-400': ticket.fulfilment_status === 'preparing',
      'bg-green-400': ticket.fulfilment_status === 'ready',
      'bg-gray-300': ticket.fulfilment_status === 'served'
    }"></div>

  <!-- Header -->
  <header class="shrink-0 flex items-start justify-between gap-2 px-3 pt-2 pb-2 border-b border-gray-200">
    <div class="min-w-0">
      <div class="flex items-center gap-2">
        <span class="font-display text-2xl font-extrabold tabular-nums">{{ orderNumber }}</span>
        <span
          *ngIf="ticket.priority"
          class="inline-flex items-center gap-1 rounded-md bg-red-600 text-white border border-red-600 px-1.5 py-0.5 text-[11px] font-bold uppercase tracking-wide">
          Priority
        </span>
      </div>
      <div class="flex items-center gap-2 mt-0.5">
        <span class="text-base font-semibold truncate">{{ ticket.table_label }}</span>
        <span
          *ngIf="isServerAssisted"
          class="inline-flex items-center gap-1 text-[11px] text-gray-500"
          title="Server-assisted order">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Server
        </span>
      </div>
    </div>

    <div class="flex flex-col items-end gap-1 shrink-0">
      <span
        class="font-mono text-lg font-bold tabular-nums"
        [ngClass]="{
          'text-gray-700': escalation === 'normal' && !isServed,
          'text-amber-600': escalation === 'warning',
          'text-red-600': escalation === 'overdue',
          'text-gray-400': isServed
        }">{{ age }}</span>
      <button
        type="button"
        (click)="onTogglePriority()"
        class="inline-flex items-center justify-center h-8 w-8 rounded-md border border-gray-300 text-gray-500 hover:bg-gray-100 transition-colors"
        [ngClass]="{ 'bg-red-100 text-red-700 border-red-300': ticket.priority }"
        [attr.aria-pressed]="ticket.priority"
        aria-label="Toggle priority">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>
      </button>
    </div>
  </header>

  <!-- Items (scrolls internally for tall orders) -->
  <div class="flex-1 overflow-y-auto px-3 py-2 space-y-2">
    <div *ngFor="let item of ticket.items" class="text-sm">
      <div class="flex items-baseline gap-2">
        <span class="font-display text-base font-bold tabular-nums shrink-0">{{ item.quantity }}×</span>
        <span class="font-semibold leading-tight">{{ item.item_name_snapshot }}</span>
      </div>

      <ul *ngIf="item.modifiers.length" class="mt-0.5 ml-7 list-disc list-inside text-gray-600 text-[13px]">
        <li *ngFor="let mod of item.modifiers">{{ mod }}</li>
      </ul>

      <div *ngIf="item.allergen_tags.length" class="mt-1 ml-7 flex flex-wrap gap-1">
        <span
          *ngFor="let tag of item.allergen_tags"
          class="inline-flex items-center gap-1 rounded-md border px-1.5 py-0.5 text-[11px] font-semibold"
          [ngClass]="allergenChip(tag.colour)">
          <span class="inline-flex items-center" [innerHTML]="iconSvg(tag.icon)"></span>
          {{ tag.name }}
        </span>
      </div>

      <!-- Extras (add-ons), indented under their parent line. -->
      <div *ngIf="item.extras?.length" class="mt-1 ml-7 space-y-1">
        <div *ngFor="let extra of item.extras" class="text-[13px]">
          <div class="flex items-baseline gap-1.5 text-gray-600">
            <span class="font-semibold tabular-nums shrink-0">+ {{ extra.quantity }}×</span>
            <span class="font-medium leading-tight">{{ extra.item_name_snapshot }}</span>
          </div>
          <ul *ngIf="extra.modifiers.length" class="mt-0.5 ml-5 list-disc list-inside text-gray-500 text-[12px]">
            <li *ngFor="let mod of extra.modifiers">{{ mod }}</li>
          </ul>
          <div *ngIf="extra.allergen_tags.length" class="mt-0.5 ml-5 flex flex-wrap gap-1">
            <span
              *ngFor="let tag of extra.allergen_tags"
              class="inline-flex items-center gap-1 rounded-md border px-1.5 py-0.5 text-[11px] font-semibold"
              [ngClass]="allergenChip(tag.colour)">
              <span class="inline-flex items-center" [innerHTML]="iconSvg(tag.icon)"></span>
              {{ tag.name }}
            </span>
          </div>
        </div>
      </div>

      <p
        *ngIf="item.item_note"
        class="mt-1 ml-7 rounded-md bg-amber-50 border border-amber-200 text-amber-800 px-2 py-1 text-[13px] leading-snug">
        <span class="font-bold">Note:</span> {{ item.item_note }}
      </p>
    </div>
  </div>

  <!-- Actions -->
  <footer class="shrink-0 flex items-center gap-2 px-3 py-2 border-t border-gray-200">
    <button
      *ngIf="next"
      type="button"
      (click)="onAdvance()"
      class="flex-1 h-12 rounded-lg bg-primary text-primary-foreground font-display text-base font-bold uppercase tracking-wide hover:bg-primary/90 active:scale-[0.98] transition">
      {{ advanceLabel }}
    </button>

    <button
      *ngIf="canRecall"
      type="button"
      (click)="onRecall()"
      class="h-12 px-3 rounded-lg border border-gray-300 text-gray-700 font-semibold hover:bg-gray-100 active:scale-[0.98] transition inline-flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      Recall
    </button>

    <span
      *ngIf="isServed"
      class="ml-auto text-xs font-semibold uppercase tracking-wide text-gray-400">Served</span>
  </footer>
</article>
