<div class="min-h-screen flex flex-col bg-white">
  <div class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="max-w-md text-center">
      <h1 class="text-3xl font-bold text-gray-900 mb-4">{{ pageTitle }}</h1>
      <p class="text-gray-600 mb-8">This page will be available soon. Please check back later.</p>
      <button (click)="goBack()"
              class="inline-flex items-center gap-2 text-sm font-semibold text-red-600 hover:text-red-700 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
        </svg>
        Go back
      </button>
    </div>
  </div>
</div>
