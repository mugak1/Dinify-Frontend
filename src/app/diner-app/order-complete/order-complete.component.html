<div class="min-h-[100dvh] bg-background flex flex-col items-center justify-center px-5 py-10">
  <div class="w-full max-w-md bg-white rounded-none shadow-xl px-7 py-9 flex flex-col items-center text-center">
    <!-- Emerald success marker: sharp square tile with a white check -->
    <div class="w-16 h-16 rounded-none bg-emerald-600 flex items-center justify-center mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6 9 17l-5-5" />
      </svg>
    </div>

    <!-- Headline in the display font (Bricolage) -->
    <h1 class="font-display text-3xl font-bold text-gray-900 mb-2">Order placed</h1>

    <!-- Payment-neutral subtext -->
    <p class="font-sans text-sm text-gray-500 leading-relaxed mb-6">
      Your order has been sent to the kitchen. Someone will bring it to your table shortly.
    </p>

    <!-- Order reference + optional table row -->
    <div class="w-full space-y-3 mb-7">
      <div *ngIf="orderRef()" class="rounded-none border border-gray-200 bg-gray-50 px-4 py-3 text-left">
        <span class="block font-sans text-[11px] uppercase tracking-widest text-gray-400 mb-1">Order reference</span>
        <span class="block font-sans text-lg font-semibold text-gray-900 tabular-nums">{{ orderRef() }}</span>
      </div>

      <div *ngIf="tableNumber() !== null"
           class="rounded-none border border-gray-200 bg-gray-50 px-4 py-3 flex items-center justify-between">
        <span class="font-sans text-[11px] uppercase tracking-widest text-gray-400">Table</span>
        <span class="font-sans text-base font-semibold text-gray-900 tabular-nums">{{ tableNumber() }}</span>
      </div>
    </div>

    <!-- Full-width back-to-menu button (sharp corners) -->
    <button type="button" (click)="backToMenu()"
            class="w-full inline-flex items-center justify-center rounded-none bg-red-600 hover:bg-red-700 active:bg-red-800 text-white py-3.5 px-4 font-sans font-semibold text-base transition-colors">
      Back to menu
    </button>
  </div>
</div>
