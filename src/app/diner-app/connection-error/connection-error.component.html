<main class="min-h-screen flex items-center justify-center bg-white px-6 py-12">
    <div class="max-w-md w-full flex flex-col items-center text-center">
        <!-- Calm "no connection" glyph (wifi-off) — gray, deliberately not the
             alarm-red of the terminal no-table screen. -->
        <svg
            class="text-gray-400 mb-8"
            width="96"
            height="96"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
            focusable="false">
            <line x1="2" y1="2" x2="22" y2="22"></line>
            <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
            <path d="M2 8.82a15 15 0 0 1 4.17-2.65"></path>
            <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"></path>
            <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"></path>
            <path d="M5 13a10 10 0 0 1 5.24-2.76"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>

        <h1 class="font-display text-2xl font-semibold text-gray-900 mb-4">
            {{ headline }}
        </h1>

        <p class="text-base text-gray-700 leading-relaxed">
            {{ description }}
        </p>

        <button
            type="button"
            (click)="retry.emit()"
            class="mt-8 inline-flex items-center justify-center gap-2 rounded-full bg-d-red px-6 py-3 text-base font-semibold text-white shadow-glow desktop-hover:shadow-glow-lg transition-[box-shadow,transform] duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-d-red focus-visible:ring-offset-2 motion-safe:active:scale-[0.98]">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true" focusable="false">
                <path d="M3 12a9 9 0 1 0 3-6.7L3 8"></path>
                <path d="M3 3v5h5"></path>
            </svg>
            Try again
        </button>

        <p *ngIf="restaurantName" class="mt-8 text-sm text-gray-500">
            {{ restaurantName }}
        </p>
    </div>
</main>
