<!--
  Three header layouts driven by branding_configs.home.header_style:
  - 'cover': full-bleed cover image with bottom-left text + dark gradient overlay
  - 'solid': brand_color background, centred content, contrast-correct text
  - 'minimal': white background, small inline arrangement
  When 'cover' is selected but no cover_photo is set, we render 'solid' instead
  (see effectiveStyle in the component). Hero element is position: relative —
  it scrolls with the page; the sticky brand strip lives in the shell.
-->

<ng-container *ngIf="effectiveStyle === 'cover'">
  <div #heroEl
       class="diner-hero diner-hero--cover relative w-full h-[200px] lg:h-[240px] overflow-hidden"
       [style.background-image]="'url(' + coverPhotoUrl + ')'">
    <div class="absolute inset-0 pointer-events-none"
         style="background: linear-gradient(to top, rgba(0,0,0,0.55), transparent 60%);"></div>
    <div class="absolute bottom-0 left-0 right-0 p-4 lg:p-6 flex items-end gap-3 text-white">
      <img *ngIf="showLogo"
           [src]="logoUrl"
           [alt]="restaurantName"
           class="h-12 w-12 lg:h-14 lg:w-14 rounded-full object-cover ring-2 ring-white/40 flex-shrink-0">
      <div class="flex flex-col min-w-0">
        <span *ngIf="showName" class="text-xl lg:text-2xl font-semibold leading-tight truncate">
          {{ restaurantName }}
        </span>
        <span *ngIf="tagline" class="text-sm lg:text-base opacity-90 truncate">
          {{ tagline }}
        </span>
      </div>
    </div>
  </div>
</ng-container>

<ng-container *ngIf="effectiveStyle === 'solid'">
  <div #heroEl
       class="diner-hero diner-hero--solid relative w-full h-[120px] flex items-center justify-center px-4"
       [style.background-color]="brandColor"
       [style.color]="solidTextColor">
    <div class="flex items-center gap-3 text-center">
      <img *ngIf="showLogo"
           [src]="logoUrl"
           [alt]="restaurantName"
           class="h-12 w-12 rounded-full object-cover flex-shrink-0">
      <div class="flex flex-col min-w-0">
        <span *ngIf="showName" class="text-xl font-semibold leading-tight truncate">
          {{ restaurantName }}
        </span>
        <span *ngIf="tagline" class="text-sm opacity-90 truncate">
          {{ tagline }}
        </span>
      </div>
    </div>
  </div>
</ng-container>

<ng-container *ngIf="effectiveStyle === 'minimal'">
  <div #heroEl
       class="diner-hero diner-hero--minimal relative w-full h-[80px] bg-white flex flex-col items-center justify-center px-4 text-gray-900">
    <div class="flex items-center gap-2">
      <img *ngIf="showLogo"
           [src]="logoUrl"
           [alt]="restaurantName"
           class="h-8 w-8 rounded-full object-cover flex-shrink-0">
      <span *ngIf="showName" class="text-base font-semibold leading-tight truncate">
        {{ restaurantName }}
      </span>
    </div>
    <span *ngIf="tagline" class="text-xs text-gray-500 truncate mt-0.5">
      {{ tagline }}
    </span>
  </div>
</ng-container>
