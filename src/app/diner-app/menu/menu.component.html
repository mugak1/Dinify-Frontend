<div  class="flex flex-col">

<app-menu-nav-bar *ngIf="isInRestApp"></app-menu-nav-bar>

<!-- Skeleton cards -->
<div *ngIf="navState.isLoading()" class="flex flex-col px-6 pt-4">
  <div *ngFor="let _ of [1,2,3,4,5]"
       class="mb-3 rounded-none bg-white shadow-xl">
    <div class="flex gap-3 p-3">
      <div class="flex-1 min-w-0 flex flex-col gap-2">
        <div class="h-4 w-2/3 bg-gray-200 animate-pulse rounded"></div>
        <div class="h-3 w-full bg-gray-200 animate-pulse rounded"></div>
        <div class="h-3 w-5/6 bg-gray-200 animate-pulse rounded"></div>
        <div class="h-4 w-24 bg-gray-200 animate-pulse rounded mt-auto"></div>
      </div>
      <div class="w-[112px] h-[112px] bg-gray-200 animate-pulse rounded-none flex-shrink-0"></div>
    </div>
  </div>
</div>

<div *ngIf="!navState.isLoading() && navState.filteredMenuList()" class="flex flex-col px-6 pb-4" [class.pb-24]="basketItems.length > 0" appScrollSpy [spiedTags]="['DIV']" (sectionChange)="onSectionChange($event)">

    <!-- Featured Section: horizontal-scrolling carousel of items with is_featured.
         Items also continue to render in their natural category sections below
         (intentional merchandising parity).
         Wrapped in a #Featured DIV so the scroll-spy (which only inspects
         direct DIV children) tracks Featured as a section — otherwise the
         pill never re-highlights when scrolling back to the top. The DIV is
         gated on featuredItems().length > 0 so the spy never emits 'Featured'
         into a state where no Featured pill exists in the nav bar. -->
    <div *ngIf="navState.featuredItems().length > 0" id="Featured" class="scroll-mt-[var(--menu-nav-stack-height)]">
      <app-featured-carousel
        [items]="navState.featuredItems()"
        (itemTap)="viewItem($event)">
      </app-featured-carousel>
    </div>

    <div id="{{addUnderScore(s.name)}}" *ngFor="let s of navState.filteredMenuList();let is=index; let last=last; trackBy: trackSection" class="scroll-mt-[var(--menu-nav-stack-height)] flex flex-col justify-between w-full font-normal text-left rtl:text-right text-black">
       <span class="font-bold text-xl pt-4 pb-2">{{s?.name}}</span>
       <div class="grid grid-cols-1 md:grid-cols-2 md:gap-x-3">
        <ng-container *ngFor="let i of s?.items; trackBy: trackItem">
          <ng-container *ngTemplateOutlet="itemCard; context: { $implicit: i }"></ng-container>
        </ng-container>
       </div>
    </div>
    <div *ngIf="(!navState.filteredMenuList() || !navState.filteredMenuList()?.length) && menu_list.length" class="flex flex-col items-center justify-center h-full w-full">
      <svg width="300px" height="200px" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Magnifying Glass -->
        <circle cx="100" cy="80" r="50" stroke="#d1d5db" stroke-width="6" fill="none"/>
        <line x1="140" y1="120" x2="180" y2="160" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/>

        <!-- Sad Face -->
        <circle cx="100" cy="80" r="5" fill="#d1d5db"/>
        <path d="M90 95 Q100 105 110 95" stroke="#d1d5db" stroke-width="4" stroke-linecap="round" fill="none"/>

        <!-- Text -->
        <text x="50%" y="180" text-anchor="middle" fill="#6b7280" font-size="16px">
          {{ navState.hasActiveFilters() ? 'No items match your filters' : 'No items found' }}
        </text>
      </svg>
      <button *ngIf="navState.hasActiveFilters()"
              type="button"
              (click)="navState.clearAllFilters()"
              class="-mt-6 text-sm font-semibold text-red-600 hover:text-red-700 px-4 py-2">
        Clear filters
      </button>
  </div>
</div>

<!-- Shared item card template — used by both the Featured section and the regular section listings -->
<ng-template #itemCard let-i>
  <div class="mb-3 rounded-none bg-white shadow-xl group transition-all duration-200 ease-out flex flex-col"
       [class.opacity-60]="isOutOfStock(i)"
       [class.cursor-not-allowed]="isOutOfStock(i)"
       [ngClass]="{ 'cursor-pointer hover:shadow-2xl hover:-translate-y-0.5 motion-safe:active:scale-[0.98] active:shadow-sm': !isOutOfStock(i) }">
    <div class="flex gap-3 p-3 flex-1" (click)="viewItem(i)">

      <!-- LEFT: Text content -->
      <div class="flex-1 min-w-0 flex flex-col">

        <!-- Item name + sold-out pill -->
        <div class="flex items-center gap-2 flex-wrap">
          <h3 class="font-bold text-base text-gray-900">{{ i.name }}</h3>
          <span *ngIf="isOutOfStock(i)"
                class="inline-flex items-center rounded-full bg-gray-200 text-gray-600 text-xs font-medium px-2 py-0.5">
            Sold out
          </span>
        </div>

        <!-- Discount badge inline (only when not sold out) -->
        <span *ngIf="i?.running_discount && !isOutOfStock(i)"
              class="inline-flex items-center self-start bg-red-500 text-white text-xs font-medium px-2 py-0.5 rounded-full mt-1">
          {{ calculateDiscount(i) }}% off
          <span class="ml-1 text-red-100">· Save UGX {{ priceSaved(i) | number }}</span>
        </span>

        <!-- Description -->
        <p class="text-sm text-gray-500 line-clamp-2 mt-1">{{ i.description }}</p>

        <!-- Bottom-pinned meta footer: calories, then price + dietary tags on one row.
             Pinned with mt-auto so it sits at the card's bottom edge regardless of
             description length, keeping price/tags aligned across every card in a row. -->
        <div class="mt-auto pt-2">

          <!-- Calories (optional) -->
          <span *ngIf="i.calories" class="block text-xs font-bold text-gray-500">{{ i.calories }} kcal</span>

          <!-- Price (left) + dietary/allergen pills (right) on one baseline-aligned row.
               Price never shrinks; pills wrap upward on the rare card with many tags,
               leaving the price bottom-aligned on every card. -->
          <div class="flex items-end justify-between gap-2 mt-1">

            <!-- Price -->
            <div class="flex-shrink-0">
              <ng-container *ngIf="i?.running_discount && !isOutOfStock(i); else normalPriceCard">
                <span class="text-red-600 font-bold text-base">UGX {{ getDisplayPrice(i) | number }}</span>
                <span class="line-through text-gray-400 text-sm ml-2">UGX {{ i.primary_price | number }}</span>
              </ng-container>
              <ng-template #normalPriceCard>
                <span [class]="isOutOfStock(i) ? 'text-gray-400 font-bold text-base' : 'text-red-600 font-bold text-base'">
                  UGX {{ i.primary_price | number }}
                </span>
              </ng-template>
            </div>

            <!-- Dietary / allergen pills -->
            <ng-container *ngIf="getCardTags(i.tags) as cardTags">
              <div *ngIf="cardTags.visible.length > 0 || cardTags.hiddenCount > 0"
                   class="flex flex-wrap justify-end gap-1">
                <app-tag-pill *ngFor="let tag of cardTags.visible"
                              [name]="tag.name"
                              [icon]="tag.icon"
                              [colour]="tag.colour"
                              size="sm"></app-tag-pill>
                <app-tag-overflow-pill *ngIf="cardTags.hiddenCount > 0"
                                       [count]="cardTags.hiddenCount"></app-tag-overflow-pill>
              </div>
            </ng-container>

          </div>
        </div>
      </div>

      <!-- RIGHT: Image with badge overlays -->
      <div class="w-[112px] h-[112px] rounded-none overflow-hidden flex-shrink-0 relative"
           [class.grayscale]="isOutOfStock(i)">

        <!-- Badge overlay (single-badge policy: Popular > New; Featured suppressed on cards) -->
        <div class="absolute top-1.5 left-1.5 z-10 flex flex-col gap-1">
          <!-- Popular badge (takes priority over New) -->
          <span *ngIf="i?.is_popular && !isOutOfStock(i)"
                class="bg-orange-500 text-white text-[10px] font-semibold uppercase px-1.5 py-0.5 rounded shadow-sm flex items-center gap-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
            </svg>
            Popular
          </span>
          <!-- New badge (only when not Popular) -->
          <span *ngIf="i?.is_new && !i?.is_popular && !isOutOfStock(i)"
                class="bg-green-500 text-white text-[10px] font-semibold uppercase px-1.5 py-0.5 rounded shadow-sm flex items-center gap-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
            </svg>
            New
          </span>
        </div>

        <!-- Eager native <img>: images are preloaded before the menu reveals,
             so this paints from cache immediately without any lazy delay. -->
        <img *ngIf="i.image"
             [src]="url + i.image"
             [alt]="i.name"
             class="w-full h-full object-cover transition-transform duration-300"
             [ngClass]="{ 'group-hover:scale-105': !isOutOfStock(i) }"
             decoding="async" />

        <!-- Quick-add affordance: decorative-only "+" indicating tappability.
             Clicks bubble to the parent card's viewItem handler. -->
        <span *ngIf="!isOutOfStock(i)"
              aria-hidden="true"
              class="absolute bottom-2 right-2 z-10 h-8 w-8 rounded-full bg-white shadow-md flex items-center justify-center text-gray-900 cursor-pointer transition-shadow group-hover:shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="M12 5v14"/>
          </svg>
        </span>
      </div>
    </div>
  </div>
</ng-template>
</div>
  <!-- Floating Basket Bar -->
  <div *ngIf="basketItems.length > 0"
       class="fixed bottom-0 left-0 right-0 z-30 p-3 bg-white border-t border-gray-200 shadow-lg lg:hidden">
    <button [routerLink]="['/diner/basket']"
            class="w-full flex items-center justify-between bg-red-600 hover:bg-red-700 text-white rounded-xl px-5 py-3.5 shadow-md transition-colors">
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
        </svg>
        <span class="font-semibold">View Basket</span>
        <span class="bg-white/20 text-white text-xs font-bold px-2 py-0.5 rounded-full">
          {{ QuantitySum }}
        </span>
      </div>
      <span class="font-bold text-base">UGX {{ totalAmount | number }}</span>
    </button>
  </div>

<!-- Tag Filter Sheet — top-level so it renders regardless of item-detail state -->
<app-diner-tag-filter-sheet></app-diner-tag-filter-sheet>
