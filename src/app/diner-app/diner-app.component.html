<app-no-table *ngIf="!table"></app-no-table>
<div *ngIf="table" class="min-h-screen flex flex-col">
  <app-diner-header #dinerHeader
    [brandingConfigs]="branding_configs"
    [restaurantName]="restaurant_name"
    [logoUrl]="logo ? url + '/media/' + logo : null"
    [coverPhotoUrl]="coverPhoto ? url + '/media/' + coverPhoto : null">
  </app-diner-header>

  <div #brandStrip
       class="brand-strip fixed inset-x-0 top-0 z-40 h-[48px] px-4 flex items-center gap-2 opacity-0 pointer-events-none transition-opacity duration-150"
       [style.background-color]="brandStripBgColor"
       [style.color]="brandStripTextColor">
    <img *ngIf="logo"
         [src]="url + '/media/' + logo"
         [alt]="restaurant_name"
         class="h-7 w-7 rounded-full object-cover flex-shrink-0">
    <span class="font-semibold truncate">{{ restaurant_name }}</span>
  </div>

  <div class="flex-1">
    <app-menu-nav-bar *ngIf="navState.isMenuActive()" [stickyTop]="'48px'"></app-menu-nav-bar>

    <div class="lg:flex lg:items-start">
      <!-- Main content column -->
      <div class="lg:flex-1 lg:min-w-0">
        <router-outlet></router-outlet>
      </div>

      <!-- Persistent basket sidebar, lg:+ only -->
      <aside class="hidden lg:block lg:w-1/3 lg:min-w-[360px] lg:max-w-[480px]
                    lg:mr-4 lg:ml-4
                    lg:sticky lg:top-[100px]
                    lg:max-h-[calc(100dvh-8rem)] lg:overflow-y-auto
                    lg:bg-white lg:rounded-none lg:shadow-sm
                    lg:border lg:border-gray-200">
        <app-basket-body></app-basket-body>
      </aside>
    </div>
  </div>

  <app-diner-footer></app-diner-footer>
</div>
