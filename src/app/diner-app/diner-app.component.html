<app-diner-connection-error
  *ngIf="!table && scanRetryable"
  [restaurantName]="restaurant_name"
  (retry)="getTableDetails(table_id)">
</app-diner-connection-error>
<app-no-table *ngIf="!table && !scanRetryable" [message]="scanMessage"></app-no-table>
<div *ngIf="table" class="min-h-screen flex flex-col">
  <div #brandStrip
       class="brand-strip sticky inset-x-0 top-0 z-40 h-[48px] px-4 flex items-center gap-2"
       [style.background-color]="brandStripBgColor"
       [style.color]="brandStripTextColor">
    <img *ngIf="logo"
         [src]="url + '/media/' + logo"
         [alt]="restaurant_name"
         class="h-7 w-7 rounded-full object-cover flex-shrink-0">
    <span class="font-display font-semibold truncate">{{ restaurant_name }}</span>
  </div>

  <!-- Ambient offline status — pins under the brand strip, spans every diner page. -->
  <app-offline-strip></app-offline-strip>

  <div class="flex-1">
    <!-- When offline the strip (40px) sits under the 48px brand strip, so push the
         sticky menu nav-bar down to 88px to clear it; otherwise it pins at 48px. -->
    <app-menu-nav-bar *ngIf="navState.isMenuActive()"
                      [stickyTop]="connectivity.isOffline() ? '88px' : '48px'"></app-menu-nav-bar>

    <div class="lg:flex lg:items-start">
      <!-- Main content column -->
      <div class="lg:flex-1 lg:min-w-0">
        <router-outlet></router-outlet>
      </div>

      <!-- Persistent basket sidebar, lg:+ only -->
      <aside class="hidden lg:block lg:w-1/3 lg:min-w-[360px] lg:max-w-[480px]
                    lg:mr-4 lg:ml-4
                    lg:sticky lg:top-[100px]
                    lg:max-h-[calc(100dvh-8rem)] lg:overflow-y-auto
                    lg:bg-white lg:rounded-none lg:shadow-sm
                    lg:border lg:border-gray-200">
        <app-basket-body></app-basket-body>
      </aside>
    </div>
  </div>

  <app-diner-footer></app-diner-footer>
</div>
