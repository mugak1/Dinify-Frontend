<!-- Shared extras selector — the diner item-detail's canonical "Add Extras" markup (red
checkboxes, discounted-extra strikethrough pricing), now rendered by both the diner route
and the preview drawer. `anchorId` carries the diner's `extras-section` scroll target.
Each extra is a REAL native checkbox (sr-only but focusable), so the list is keyboard- and
screen-reader-operable; the visual box mirrors checked state + shows a `peer-focus-visible` ring. -->
<div [id]="anchorId" role="group" aria-labelledby="extras-selector-label"
  class="border border-gray-200 rounded-xl p-4 space-y-3">
  <div class="flex items-center gap-2 flex-wrap" id="extras-selector-label">
    <h4 class="font-semibold text-base">Add Extras</h4>
    @if (required) {
      <span
        class="bg-red-600 text-white text-xs font-medium px-2 py-0.5 rounded">
        Required
      </span>
    }
    @if (!required) {
      <span
        class="bg-gray-100 text-gray-500 text-xs font-medium px-2 py-0.5 rounded">
        Optional
      </span>
    }
  </div>

  @if (constraintLabel) {
    <p class="text-xs text-gray-500">{{ constraintLabel }}</p>
  }

  @if (error) {
    <p class="text-red-500 text-sm" role="alert">{{ error }}</p>
  }

  <div class="space-y-1">
    @for (extra of extras; track extra) {
      <label
        class="flex items-center justify-between py-3 px-1 min-h-[44px] cursor-pointer border-b border-gray-100 last:border-0"
        [class.opacity-50]="!isSelected(extra.id) && atMax"
        [class.cursor-not-allowed]="!isSelected(extra.id) && atMax">
        <div class="flex items-center gap-3">
          <input #cb type="checkbox" class="peer sr-only"
            [checked]="isSelected(extra.id)"
            [disabled]="!isSelected(extra.id) && atMax"
            (change)="toggled.emit(extra.id)" />
          <div class="h-[20px] w-[20px] rounded border-2 flex items-center justify-center flex-shrink-0 peer-focus-visible:ring-2 peer-focus-visible:ring-offset-2 peer-focus-visible:ring-red-500"
             [ngClass]="{
               'border-red-600 bg-red-600': isSelected(extra.id),
               'border-gray-300': !isSelected(extra.id)
             }">
            @if (isSelected(extra.id)) {
              <svg xmlns="http://www.w3.org/2000/svg"
                class="h-[12px] w-[12px] text-white" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6 9 17l-5-5"/>
              </svg>
            }
          </div>
          <span class="text-sm" [class.font-semibold]="isSelected(extra.id)">{{ extra.name }}</span>
        </div>
        <span class="text-sm">
          @if (extra.isDiscounted) {
            <app-price-display size="sm" prefix="+"
              [effective]="extra.effectivePrice"
            [original]="extra.originalPrice"></app-price-display>
          } @else {
            <span class="text-gray-500">+UGX {{ extra.effectivePrice | number }}</span>
          }
        </span>
      </label>
    }
  </div>

  @if (maxSelections > 1) {
    <div class="text-xs text-gray-500 pt-1">
      {{ selectedIds.length }} of {{ maxSelections }} selected
    </div>
  }
</div>
