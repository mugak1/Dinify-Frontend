<!-- Shared diner dish-card. Reproduces the diner menu `#itemCard` exactly; rendered by both
     the diner menu and the portal preview drawer so the two can never drift again.
     `mb-3` lives on the root (mirrors the diner card) — hosts that stack cards should NOT
     add their own vertical gap on top of it. -->
<!-- The whole card is one button: role/tabindex/keyboard make it operable without a
     pointer, and a concise aria-label (name + price) keeps the long description out of the
     accessible name. Out of stock → inert (no tabindex, aria-disabled). (cardClick) is
     unchanged, so both consumers (diner menu + preview drawer) keep working. -->
<div class="mb-3 rounded-[20px] bg-white shadow-[var(--shadow-md)] group transition-all duration-200 ease-out flex flex-col"
     role="button"
     [attr.tabindex]="outOfStock ? null : 0"
     [attr.aria-disabled]="outOfStock ? true : null"
     [attr.aria-label]="name + ', UGX ' + (effectivePrice | number)"
     (click)="onCardClick()"
     (keydown.enter)="onCardClick()"
     (keydown.space)="onCardClick(); $event.preventDefault()"
     [class.opacity-60]="outOfStock"
     [class.cursor-not-allowed]="outOfStock"
     [ngClass]="{ 'cursor-pointer hover:shadow-[0_28px_55px_-12px_rgba(0,0,0,0.35)] hover:-translate-y-0.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-red-600 desktop-hover:ring-2 desktop-hover:ring-inset desktop-hover:ring-red-600 motion-safe:active:scale-[0.98] active:shadow-sm': !outOfStock }">

  <!-- Single flex ROW: text column (name -> meta -> discount -> description -> price) on the
       left, the 104px photo with its overhanging add button on the right. The price is
       mt-auto-anchored to the text column's bottom; the description reserves 2 lines (min-h)
       so 1- and 2-line dishes keep the price on the same baseline. -->
  <div class="flex gap-[14px] p-[14px] flex-1">

    <!-- TEXT COLUMN -->
    <div class="flex-1 min-w-0 flex flex-col">

      <!-- Item name + sold-out pill -->
      <div class="flex items-center gap-2 flex-wrap">
        <h3 class="font-display font-bold text-dish-title text-gray-900"><ng-container *ngFor="let seg of (name | highlight: searchQuery)"><mark *ngIf="seg.match" class="bg-amber-200 text-gray-900 rounded-[2px]">{{ seg.text }}</mark><ng-container *ngIf="!seg.match">{{ seg.text }}</ng-container></ng-container></h3>
        <span *ngIf="outOfStock"
              class="inline-flex items-center rounded-full bg-gray-200 text-gray-600 text-xs font-medium px-2 py-0.5">
          Sold out
        </span>
      </div>

      <!-- META: calories + dietary/allergen tags on one line -->
      <div class="flex items-center gap-[6px] flex-wrap mt-[7px]">
        <span *ngIf="calories" class="text-caption font-bold text-gray-500">{{ calories }} kcal</span>
        <div *ngIf="visibleTags.length > 0 || hiddenTagCount > 0"
             class="flex flex-wrap gap-1">
          <app-tag-pill *ngFor="let tag of visibleTags"
                        [name]="tag.name"
                        [icon]="tag.icon"
                        [colour]="tag.colour"
                        size="sm"></app-tag-pill>
          <app-tag-overflow-pill *ngIf="hiddenTagCount > 0"
                                 [count]="hiddenTagCount"></app-tag-overflow-pill>
        </div>
      </div>

      <!-- Discount badge (only when live and not sold out) -->
      <app-discount-badge *ngIf="showDiscount"
                          class="self-start mt-[9px]"
                          variant="solid" size="md"
                          [percent]="discountPercent"
                          [save]="savings"></app-discount-badge>

      <!-- "Contains" cue for description-only search matches -->
      <span *ngIf="showContainsCue"
            class="inline-flex items-center self-start bg-amber-50 text-amber-700 text-xs font-medium px-2 py-0.5 rounded-full mt-[9px]">
        Contains "{{ searchQuery }}"
      </span>

      <!-- Description (clamped to 2; min-h reserves 2 lines so the price baseline stays put) -->
      <p class="text-body text-gray-500 line-clamp-2 min-h-[40px] mt-[9px]"><ng-container *ngFor="let seg of (description | highlight: searchQuery)"><mark *ngIf="seg.match" class="bg-amber-200 text-gray-900 rounded-[2px]">{{ seg.text }}</mark><ng-container *ngIf="!seg.match">{{ seg.text }}</ng-container></ng-container></p>

      <!-- PRICE — anchored to the bottom of the text column -->
      <div class="mt-auto pt-[12px]">
        <app-price-display *ngIf="showDiscount; else normalPriceCard"
                           size="menu-card"
                           [effective]="effectivePrice"
                           [original]="originalPrice"></app-price-display>
        <ng-template #normalPriceCard>
          <span [class]="outOfStock ? 'font-display font-extrabold text-dish-title text-gray-400' : 'font-display font-extrabold text-dish-title text-d-red'">
            UGX {{ effectivePrice | number }}
          </span>
        </ng-template>
      </div>
    </div>

    <!-- PHOTO COLUMN — relative wrapper, NOT overflow-hidden so the add button can overhang -->
    <div class="relative w-[104px] h-[104px] flex-shrink-0 self-start">

      <!-- The photo lives in its OWN overflow-hidden box (keeps the rounded corners and clips
           the badge overlays); the add button is a SIBLING below, so its overhang and ring
           are never clipped. -->
      <div class="relative w-[104px] h-[104px] rounded-[16px] overflow-hidden bg-gray-100"
           [class.grayscale]="outOfStock">

        <!-- Neutral placeholder for a photo-less dish OR a broken image URL — replaces the
             former transparent "blank hole" (a plate glyph on the gray fill). -->
        <div *ngIf="!imageUrl || imageFailed"
             class="absolute inset-0 flex items-center justify-center text-gray-300" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11h18"/><path d="M12 11a5 5 0 0 0-5 5v1h10v-1a5 5 0 0 0-5-5z"/><path d="M12 11V6"/><path d="M8 6h8"/>
          </svg>
        </div>

        <!-- Badge overlay (single-badge policy: Popular > New; Featured suppressed on cards) -->
        <div class="absolute top-1.5 left-1.5 z-10 flex flex-col gap-1">
          <span *ngIf="isPopular && !outOfStock"
                class="bg-orange-500 text-white text-micro font-semibold uppercase px-1.5 py-0.5 rounded shadow-sm flex items-center gap-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
            </svg>
            Popular
          </span>
          <span *ngIf="isNew && !isPopular && !outOfStock"
                class="bg-green-500 text-white text-micro font-semibold uppercase px-1.5 py-0.5 rounded shadow-sm flex items-center gap-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
            </svg>
            New
          </span>
        </div>

        <!-- Eager native <img>: images are preloaded before the menu reveals, so this paints
             from cache immediately. -->
        <img *ngIf="imageUrl && !imageFailed"
             [src]="imageUrl"
             [alt]="name"
             class="w-full h-full object-cover transition-transform duration-300"
             [ngClass]="{ 'group-hover:scale-105': !outOfStock }"
             decoding="async"
             (error)="onImageError()" />
      </div>

      <!-- Quick-add affordance: decorative-only "+", overhanging the photo's bottom-right
           corner with a white ring punched into the card surface. aria-hidden; taps bubble
           to the parent row's onCardClick handler (no basket dispatch). -->
      <span *ngIf="!outOfStock"
            aria-hidden="true"
            class="absolute bottom-[-7px] right-[-7px] z-10 h-[38px] w-[38px] rounded-full bg-d-red ring-4 ring-white shadow-glow desktop-hover:shadow-glow-lg flex items-center justify-center text-white cursor-pointer transition-[box-shadow,transform] duration-200 motion-safe:active:scale-[0.95]">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="M12 5v14"/>
        </svg>
      </span>
    </div>

  </div>
</div>
